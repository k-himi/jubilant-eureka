let quizState = { item: null, quizData: null, answered: false };

function openQuizModal(item) {
  quizState = { item, quizData: null, answered: false };
  const plainText = item.text.replace(/<[^>]+>/g, '');
  document.getElementById('quizTopic').textContent = item.review || plainText.slice(0, 40) + '…';
  document.getElementById('quizOverlay').classList.add('open');
  loadQuiz(item);
}

function closeQuizModal() {
  document.getElementById('quizOverlay').classList.remove('open');
}

document.getElementById('quizClose').addEventListener('click', closeQuizModal);
document.getElementById('quizOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeQuizModal();
});

function loadQuiz(item) {
  const q = QUIZZES[item.id];
  if (!q) {
    document.getElementById('quizBody').innerHTML = `
      <div style="padding:32px;text-align:center;color:var(--text2)">
        <div style="font-size:28px;margin-bottom:10px">📝</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:6px">この項目のクイズは準備中です。</div>
        <div style="font-size:11px;color:var(--text3)">振り返りヒントを確認して理解を深めましょう。</div>
      </div>`;
    return;
  }
  quizState.quizData = q;
  renderQuiz(q);
}

// ── 問題レンダリング
function renderQuiz(q) {
  const body = document.getElementById('quizBody');
  const typeLabel = q.type === 'mc' ? '選択式' : q.type === 'fill' ? '穴埋め式' : '記述式';
  const typeCls   = q.type === 'mc' ? 'mc'    : q.type === 'fill' ? 'fil'      : 'txt';

  let html = `<div class="quiz-type-badge ${typeCls}">${typeLabel}</div>
    <div class="quiz-question">${q.question}</div>`;

  if (q.type === 'mc') {
    html += `<div class="quiz-choices" id="quizChoices">`;
    q.choices.forEach((c, i) => {
      const key = ['A','B','C','D'][i];
      html += `<button class="quiz-choice" data-key="${key}" onclick="answerMC('${key}')">`
            + `<span class="quiz-choice-key">${key}</span>${c.replace(/^[A-D]\.\s*/,'')}</button>`;
    });
    html += `</div>`;
  } else if (q.type === 'fill') {
    if (q.hint) html += `<div style="font-size:11px;color:var(--text3);margin-bottom:8px">💡 ヒント：${q.hint}</div>`;
    html += `<div class="quiz-input-wrap">
      <input class="quiz-input" style="min-height:auto;resize:none" id="quizFillInput"
        placeholder="答えを入力してください" onkeydown="if(event.key==='Enter')submitFill()">
    </div>`;
  } else {
    html += `<div class="quiz-input-wrap">
      <textarea class="quiz-input" id="quizTextInput" placeholder="自分の言葉で説明してください"></textarea>
    </div>`;
  }

  html += `<div class="quiz-result" id="quizResult">
    <div class="quiz-result-head" id="quizResultHead"></div>
    <div class="quiz-result-body" id="quizResultBody"></div>
  </div>
  <div class="quiz-actions" id="quizActions">`;

  if (q.type === 'mc') {
    // 選択式はボタンクリックで即回答
    html += `</div>`;
  } else if (q.type === 'fill') {
    html += `<button class="quiz-action-btn qab-submit" id="quizSubmitBtn" onclick="submitFill()">答え合わせ</button></div>`;
  } else {
    html += `<button class="quiz-action-btn qab-submit" id="quizSubmitBtn" onclick="submitText()">AIに採点してもらう</button></div>`;
  }

  body.innerHTML = html;

  if (q.type === 'fill') {
    document.getElementById('quizFillInput')?.focus();
  } else if (q.type === 'text') {
    document.getElementById('quizTextInput')?.focus();
  }
}

// ── 選択式：即時判定
function answerMC(key) {
  if (quizState.answered) return;
  quizState.answered = true;
  const q = quizState.quizData;
  const correct = q.answer.toUpperCase().replace(/[^A-D]/,'');
  document.querySelectorAll('.quiz-choice').forEach(btn => {
    btn.disabled = true;
    const k = btn.dataset.key;
    if (k === correct) btn.classList.add('correct');
    else if (k === key && key !== correct) btn.classList.add('incorrect');
  });
  const pass = key === correct;
  showResult(pass,
    pass ? '正解！' : `不正解 — 正解は ${correct}`,
    q.explanation || ''
  );
}

// ── 穴埋め式：文字列判定
function submitFill() {
  if (quizState.answered) return;
  const input = document.getElementById('quizFillInput');
  if (!input || !input.value.trim()) return;
  quizState.answered = true;
  const q = quizState.quizData;
  const userAns = input.value.trim();
  // 正解との比較（スペース・記号を除いた比較）
  const normalize = s => s.replace(/[\s・、。]/g,'').toLowerCase();
  const pass = normalize(userAns) === normalize(q.answer);
  input.disabled = true;
  showResult(pass,
    pass ? '正解！' : `不正解 — 正解：${q.answer}`,
    q.explanation || ''
  );
}

// ── 記述式：AIが採点
function submitText() {
  if (quizState.answered) return;
  const input = document.getElementById('quizTextInput');
  if (!input || !input.value.trim()) return;
  quizState.answered = true;
  const q = quizState.quizData;
  // 模範解答と採点基準を表示して自己採点してもらう
  const pointsHtml = (q.points||[]).map(p => `<li style="margin-bottom:3px">${p}</li>`).join('');
  const body = `
    <div style="margin-bottom:8px"><strong style="color:var(--text)">模範解答：</strong><br>
    <span style="color:var(--text2)">${q.model_answer}</span></div>
    ${q.points?.length ? `<div><strong style="color:var(--text)">採点基準：</strong><ul style="margin:4px 0 0 16px;color:var(--text2);font-size:11px">${pointsHtml}</ul></div>` : ''}
  `;
  // 自己採点ボタンを表示
  const result = document.getElementById('quizResult');
  result.className = 'quiz-result show';
  result.style.background = 'rgba(88,166,255,0.08)';
  result.style.borderColor = 'rgba(88,166,255,0.3)';
  document.getElementById('quizResultHead').innerHTML = '📖 模範解答を確認して自己採点しよう';
  document.getElementById('quizResultHead').style.color = 'var(--accent)';
  document.getElementById('quizResultBody').innerHTML = body;
  const actions = document.getElementById('quizActions');
  const itemId = quizState.item?.id;
  actions.innerHTML = `
    <button class="quiz-action-btn" style="background:var(--orange);color:#000" onclick="showResult(false,'もう少し！自信がついたらまた挑戦しよう','')">△ もう少し</button>
    <button class="quiz-action-btn qab-check" onclick="checkFromQuiz('${itemId}')">✓ 理解できた！</button>
  `;
}

// ── 結果表示・アクションボタン
function showResult(pass, head, body) {
  const result = document.getElementById('quizResult');
  result.className = 'quiz-result show ' + (pass ? 'pass' : 'fail');
  document.getElementById('quizResultHead').innerHTML = (pass ? '✅ ' : '❌ ') + head;
  document.getElementById('quizResultBody').innerHTML = body;

  // アクションボタン更新
  const actions = document.getElementById('quizActions');
  const itemId = quizState.item?.id;
  const alreadyChecked = itemId && state.checked[itemId];
  actions.innerHTML = `
    ${pass && !alreadyChecked
      ? `<button class="quiz-action-btn qab-check" onclick="checkFromQuiz('${itemId}')">✓ 理解済みにする</button>`
      : alreadyChecked
        ? `<span style="font-size:11px;color:var(--green);align-self:center">✓ 完了済み</span>`
        : ''}
    <button class="quiz-action-btn qab-next" onclick="closeQuizModal()">閉じる</button>
  `;
}

function checkFromQuiz(itemId) {
  if (!itemId) return;
  state.checked[itemId] = true;
  save();
  renderAll();
  closeQuizModal();
}

function retryQuiz() {
  quizState.answered = false;
  quizState.quizData = null;
  document.getElementById('quizBody').innerHTML = `
    <div class="quiz-loading">
      <div class="quiz-spinner"></div>
      <div class="quiz-loading-text">AIが問題を生成しています…</div>
    </div>`;
  loadQuiz(quizState.item);
}


function renderAll() {
  // ページ遷移時に残ったツールチップを消す
  document.querySelectorAll('.phase-tooltip').forEach(el => el.remove());
  renderSidebar();
  // モバイルではサイドバーボタンに自動クローズを付与
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').querySelectorAll('.scope-btn').forEach(btn => {
      btn.addEventListener('click', () => setTimeout(closeSidebar, 150));
    });
  }
  renderMain();
  // ページ遷移後にスクロール位置をトップに戻す
  requestAnimationFrame(() => {
    window.scrollTo(0, 0);
    const main = document.getElementById('main');
    if (main) main.scrollTop = 0;
  });
}

renderAll();

function toggleSidebar() {

}

const TOUR_KEY = 'chem_nav_tour_done';

const TOUR_STEPS = [
  {

  },

    target: null,
    targetSelector: '.quiz-btn',
    side: 'left',
  },
  {

    body: '録音から作った授業メモが付いている項目には 📝 ボタンが表示されます。\n先生のキーフレーズや例え話を振り返れます。',
    target: null,

    target: null,

  },

    body: 'まずはトップページの試験範囲カードにマウスを乗せてみてください。\nわからないことがあればこのガイドはいつでも再表示できます。',
    target: null,

  },
];

let tourStep = 0;
let tourActive = false;

function startTour() {
  closeSidebar();
  tourActive = true;
  tourStep = 0;
  // ホーム画面に戻す
  if (state.scopeId !== null) {
    state.scopeId = null;
    renderAll();
  }
  // ドット生成
  const dots = document.getElementById('tourDots');
  dots.innerHTML = '';
  TOUR_STEPS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'tour-dot';
    dots.appendChild(d);
  });
  showTourStep(0);
}

function showTourStep(idx) {
  const step = TOUR_STEPS[idx];
  const ring    = document.getElementById('tourRing');
  const bubble  = document.getElementById('tourBubble');
  const stepNum = document.getElementById('tourStepNum');
  const title   = document.getElementById('tourTitle');
  const body    = document.getElementById('tourBody');
  const nextBtn = document.getElementById('tourNext');

  // ドット更新
  document.querySelectorAll('.tour-dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
    d.classList.toggle('done',   i < idx);
  });

  stepNum.textContent = `STEP ${idx + 1} / ${TOUR_STEPS.length}`;
  title.textContent   = step.title;
  body.textContent    = step.body;

  const isLast = step.isLast || idx === TOUR_STEPS.length - 1;
  nextBtn.textContent = isLast ? '✓ はじめる' : '次へ';
  nextBtn.className   = 'tour-btn-next' + (isLast ? ' finish' : '');

  // 最終ステップでボタンをパルス開始
  const tourBtn = document.querySelector('.header-tour-btn');
  if (isLast) {
    if (tourBtn) tourBtn.classList.add('pulse');
  } else {
    if (tourBtn) tourBtn.classList.remove('pulse');
  }

  // ターゲット要素を探す
  let targetEl = null;
  if (step.target)         targetEl = document.querySelector(step.target);
  if (step.targetSelector) targetEl = document.querySelector(step.targetSelector);
  if (step.targetText) {
    document.querySelectorAll('.scope-btn-name').forEach(el => {
      if (el.textContent.trim().includes(step.targetText.replace('📖 ',''))) targetEl = el.closest('.scope-btn');
    });
  }

  bubble.style.display = 'block';
  // 古いarrowを削除
  bubble.querySelectorAll('.tour-bubble-arrow').forEach(a => a.remove());

  // モバイルでは常に画面下部中央に固定表示
  if (window.innerWidth <= 768) {
    ring.style.display = 'none';
    bubble.style.left   = '12px';
    bubble.style.right  = '12px';
    bubble.style.width  = 'calc(100vw - 24px)';
    bubble.style.bottom = '24px';
    bubble.style.top    = 'auto';
    // アニメーションリセット
    bubble.style.animation = 'none';
    bubble.offsetHeight;
    bubble.style.animation = '';
    return;
  }

  if (targetEl) {
    const rect = targetEl.getBoundingClientRect();
    const pad  = 6;
    ring.style.display = 'block';
    ring.style.left   = (rect.left   - pad) + 'px';
    ring.style.top    = (rect.top    - pad) + 'px';
    ring.style.width  = (rect.width  + pad*2) + 'px';
    ring.style.height = (rect.height + pad*2) + 'px';

    // バブル位置（ターゲットの下 or 右）
    const side = step.side || 'bottom';
    const bw = 300, bh = 180;
    let bx, by;

    if (side === 'bottom') {
      bx = Math.max(8, Math.min(window.innerWidth - bw - 8,
            rect.left + rect.width / 2 - bw / 2));
      by = rect.bottom + 16;
      if (by + bh > window.innerHeight - 8) by = rect.top - bh - 16;
      const arrow = document.createElement('div');
      arrow.className = 'tour-bubble-arrow tour-arrow-top';
      arrow.style.left = (rect.left + rect.width/2 - bx - 6) + 'px';
      bubble.prepend(arrow);
    } else if (side === 'right') {
      bx = rect.right + 16;
      by = Math.max(8, Math.min(window.innerHeight - bh - 8,
            rect.top + rect.height / 2 - bh / 2));
      if (bx + bw > window.innerWidth - 8) bx = rect.left - bw - 16;
      const arrow = document.createElement('div');
      arrow.className = 'tour-bubble-arrow tour-arrow-left';
      arrow.style.top = (rect.top + rect.height/2 - by - 6) + 'px';
      bubble.prepend(arrow);
    } else if (side === 'left') {
      bx = rect.left - bw - 16;
      if (bx < 8) bx = rect.right + 16;
      by = Math.max(8, Math.min(window.innerHeight - bh - 8,
            rect.top + rect.height / 2 - bh / 2));
    }

    bubble.style.left = bx + 'px';
    bubble.style.top  = by + 'px';
  } else {
    // 中央表示
    ring.style.display = 'none';
    bubble.style.left = Math.max(8, window.innerWidth  / 2 - 150) + 'px';
    bubble.style.top  = Math.max(8, window.innerHeight / 2 - 90)  + 'px';
  }

  // アニメーションリセット
  bubble.style.animation = 'none';
  bubble.offsetHeight;
  bubble.style.animation = '';
}

function tourNext() {
  if (!tourActive) return;
  if (tourStep >= TOUR_STEPS.length - 1) {
    endTour();
    return;
  }
  // step3（チェックリスト）に進む前にチェックリスト画面へ切り替え
  if (tourStep === 2) {
    const firstScope = state.scopeId || 'mid1';
    if (!state.scopeId) {
      state.scopeId = 'mid1';
      state.currentHour = 1;
      renderAll();
      setTimeout(() => { tourStep++; showTourStep(tourStep); }, 350);
      return;
    }
  }
  tourStep++;
  showTourStep(tourStep);
}

function endTour() {
  tourActive = false;
  document.getElementById('tourRing').style.display = 'none';
  localStorage.setItem(TOUR_KEY, '1');

  const bubble  = document.getElementById('tourBubble');
  const tourBtn = document.querySelector('.header-tour-btn');

  if (tourBtn && bubble.style.display !== 'none') {
    // ボタンの中心座標を取得
    const btnRect = tourBtn.getBoundingClientRect();
    const btnCx   = btnRect.left + btnRect.width  / 2;
    const btnCy   = btnRect.top  + btnRect.height / 2;

    // 吹き出しの現在の中心から吹き出しの transform-origin をボタン方向に設定
    const bRect = bubble.getBoundingClientRect();
    const originX = btnCx - bRect.left;
    const originY = btnCy - bRect.top;
    bubble.style.transformOrigin = `${originX}px ${originY}px`;

    // 吸い込みアニメーション開始
    // animation を無効化してtransitionで制御
    bubble.style.animation = 'none';
    requestAnimationFrame(() => {
      bubble.classList.add('fly-to');
      bubble.addEventListener('transitionend', () => {
        bubble.style.display = 'none';
        bubble.classList.remove('fly-to');
        bubble.style.transformOrigin = '';
        bubble.style.animation = '';
        // パルスを止めてボタンを通常に戻す
        tourBtn.classList.remove('pulse');
      }, { once: true });
    });
  } else {
    bubble.style.display = 'none';
    if (tourBtn) tourBtn.classList.remove('pulse');
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('tourNext').addEventListener('click', tourNext);
  document.getElementById('tourSkip').addEventListener('click', endTour);

  // Enterキーでも次へ進む
  document.addEventListener('keydown', (e) => {
    if (!tourActive) return;
    if (e.key === 'Enter') { e.preventDefault(); tourNext(); }
    if (e.key === 'Escape') { endTour(); }
  });

  // 初回起動判定
  if (!localStorage.getItem(TOUR_KEY)) {
    setTimeout(startTour, 600);
  }
});
