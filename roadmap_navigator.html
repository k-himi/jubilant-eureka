<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>必修化学 学習ロードマップナビゲーター</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

:root {
  --bg:        #0d1117;
  --surface:   #161b27;
  --surface2:  #1d2436;
  --border:    #252f45;
  --border2:   #2e3a55;
  --accent:    #58a6ff;
  --accent-dim:rgba(88,166,255,0.15);
  --green:     #3fb950;
  --green-dim: rgba(63,185,80,0.12);
  --orange:    #f0883e;
  --orange-dim:rgba(240,136,62,0.15);
  --text:      #e6edf3;
  --text2:     #8b949e;
  --text3:     #404d61;
  --done-bg:   #0d1f12;
  --font:      'Noto Sans JP', sans-serif;
  --mono:      'JetBrains Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; line-height: 1.6; }
@media (max-width: 768px) {
  body { overflow-y: auto; }
  html { overflow-y: auto; }
}

.app { display: grid; grid-template-columns: 260px 1fr; grid-template-rows: 48px 1fr; height: 100vh; overflow: hidden; }

header { grid-column: 1/-1; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 12px; }
.header-tag { font-family: var(--mono); font-size: 10px; color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(88,166,255,0.25); padding: 2px 8px; border-radius: 4px; letter-spacing: 0.08em; }
header h1 { font-size: 14px; font-weight: 700; flex: 1; }
#headerBadge { font-size: 11px; color: var(--text2); font-family: var(--mono); }
.header-tour-btn {
  background: none;
  border: 1px solid var(--border2);
  border-radius: 5px;
  padding: 3px 10px;
  font-size: 10px;
  color: var(--text3);
  cursor: pointer;
  font-family: var(--font);
  transition: border-color 0.15s, color 0.15s;
}
.header-tour-btn:hover { border-color: var(--accent); color: var(--accent); }
.header-tour-btn.pulse {
  border-color: var(--accent);
  color: var(--accent);
  animation: tourBtnBounce 0.7s cubic-bezier(.36,.07,.19,.97) infinite;
}
@keyframes tourBtnBounce {
  0%,100% { transform: translateY(0);    box-shadow: 0 0 0 0   rgba(88,166,255,0.5); }
  20%     { transform: translateY(-5px); box-shadow: 0 6px 12px rgba(88,166,255,0.35); }
  40%     { transform: translateY(0);    box-shadow: 0 0 0 0   rgba(88,166,255,0); }
  60%     { transform: translateY(-3px); box-shadow: 0 4px 8px rgba(88,166,255,0.2); }
  80%     { transform: translateY(0); }
}
/* 吹き出しがボタンに吸い込まれるアニメーション */
.tour-bubble.fly-to {
  transition: left 0.8s cubic-bezier(.4,0,.6,1),
              top  0.8s cubic-bezier(.4,0,.6,1),
              transform 0.8s cubic-bezier(.4,0,.6,1),
              opacity  0.7s ease 0.1s;
  transform: scale(0.12) !important;
  opacity: 0 !important;
}

.sidebar { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
.sidebar-head { padding: 12px 16px 8px; font-size: 10px; letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; font-family: var(--mono); border-bottom: 1px solid var(--border); }

.scope-btn { width: 100%; background: none; border: none; border-left: 3px solid transparent; padding: 10px 16px 10px 13px; text-align: left; cursor: pointer; color: var(--text2); font-family: var(--font); font-size: 12px; transition: all 0.15s; display: flex; flex-direction: column; gap: 4px; }
.scope-btn:hover { background: var(--surface2); color: var(--text); }
.scope-btn.active { background: var(--surface2); border-left-color: var(--accent); color: var(--text); }
.scope-btn-top { display: flex; align-items: center; gap: 6px; }
.scope-btn-name { font-weight: 700; font-size: 12px; flex: 1; }
.scope-term { font-size: 9px; font-family: var(--mono); background: var(--surface); padding: 1px 5px; border-radius: 3px; color: var(--text3); border: 1px solid var(--border2); }
.scope-btn.active .scope-term { background: var(--accent-dim); color: var(--accent); border-color: rgba(88,166,255,0.3); }
.scope-mini-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.scope-mini-fill { height: 100%; background: var(--green); transition: width 0.4s; }
.scope-mini-meta { font-size: 9px; font-family: var(--mono); color: var(--text3); display: flex; justify-content: space-between; }

.main { overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }

.overview { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
.overview-top { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 12px; }
.overview-title { flex: 1; }
.overview-title h2 { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
.overview-title p { font-size: 11px; color: var(--text2); }
.ov-stats { display: flex; gap: 16px; }
.ov-stat { text-align: center; }
.ov-num { font-family: var(--mono); font-size: 22px; font-weight: 600; line-height: 1; margin-bottom: 2px; }
.ov-num.g { color: var(--green); } .ov-num.b { color: var(--accent); } .ov-num.o { color: var(--orange); }
.ov-lbl { font-size: 9px; color: var(--text3); letter-spacing: 0.05em; }
.tl-labels { display: flex; justify-content: space-between; font-size: 9px; font-family: var(--mono); color: var(--text3); margin-bottom: 3px; padding: 0 1px; }
.tl-track { height: 20px; display: flex; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); background: var(--bg); }
.tl-blk { flex: 1; border-right: 1px solid var(--border); cursor: pointer; transition: opacity 0.12s; }
.tl-blk:last-child { border-right: none; }
.tl-blk:hover { opacity: 0.7; }
.tl-blk.st-done    { background: rgba(63,185,80,0.4); }
.tl-blk.st-partial { background: rgba(240,136,62,0.35); }
.tl-blk.st-current { background: rgba(88,166,255,0.3); animation: pulse 2s ease-in-out infinite; }
.tl-blk.st-future  { background: transparent; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
.hour-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.hour-row label { font-size: 11px; color: var(--text2); }
.hr-btns { display: flex; gap: 3px; flex-wrap: wrap; }
.hr-btn { font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 3px; border: 1px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; transition: all 0.12s; }
.hr-btn:hover { border-color: var(--accent); color: var(--accent); }
.hr-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
.hr-btn.done   { border-color: var(--green); color: var(--green); }

.flow-section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.flow-header { padding: 8px 14px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 700; color: var(--text2); display: flex; align-items: center; gap: 8px; }
.flow-body { padding: 12px 14px; display: flex; align-items: center; gap: 6px; overflow-x: auto; flex-wrap: wrap; }
@media (max-width: 768px) {
  .flow-body { flex-wrap: nowrap; overflow-x: auto; padding: 10px 12px; }
  .flow-node { min-width: 56px; }
  .flow-node-name { font-size: 9px; max-width: 60px; }
}
.flow-node { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 6px; border-radius: 6px; transition: background 0.12s; min-width: 64px; border: 1px solid transparent; }
.flow-node:hover { background: var(--surface2); }
.flow-node.fn-active { border-color: var(--accent); background: var(--accent-dim); }
.flow-node.fn-done   { border-color: var(--green);  background: var(--green-dim); }
.flow-node.fn-partial{ border-color: var(--orange); background: var(--orange-dim); }
.flow-circle { width: 44px; height: 44px; display: grid; place-items: center; font-size: 9px; font-family: var(--mono); font-weight: 600; background: var(--bg); color: var(--text2); flex-shrink: 0; }
.flow-circle svg { grid-area: 1/1; width: 44px; height: 44px; }
.flow-circle span { grid-area: 1/1; position: relative; z-index: 1; }
.fn-done .flow-circle   { color: var(--green); }
.fn-active .flow-circle { color: var(--accent); }
.fn-partial .flow-circle{ color: var(--orange); }
.flow-node-name { font-size: 10px; text-align: center; color: var(--text2); line-height: 1.3; max-width: 68px; }
.fn-done .flow-node-name   { color: var(--green); }
.fn-active .flow-node-name { color: var(--accent); font-weight: 700; }
.flow-arrow { color: var(--text3); font-size: 14px; flex-shrink: 0; align-self: flex-start; margin-top: 10px; }

.cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 768px) {
  .cards-grid { grid-template-columns: 1fr; }
}
.phase-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: border-color 0.2s; }
.phase-card.is-active { border-color: var(--accent); }
.pc-header { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; cursor: pointer; }
.pc-num { font-family: var(--mono); font-size: 10px; font-weight: 600; background: var(--surface2); border: 1px solid var(--border2); padding: 1px 6px; border-radius: 3px; color: var(--text2); flex-shrink: 0; }
.is-active .pc-num { background: var(--accent-dim); color: var(--accent); border-color: rgba(88,166,255,0.3); }
.pc-title { flex: 1; font-size: 12px; font-weight: 700; line-height: 1.3; }
.pc-ring { width: 30px; height: 30px; flex-shrink: 0; }
.pc-body { overflow: hidden; max-height: 600px; transition: max-height 0.3s ease; }
.phase-card.collapsed .pc-body { max-height: 0; }
.pc-arrow { color: var(--text3); font-size: 10px; transition: transform 0.2s; flex-shrink: 0; }
.phase-card.collapsed .pc-arrow { transform: rotate(-90deg); }
.checklist { list-style: none; padding: 8px 10px; display: flex; flex-direction: column; gap: 3px; }
.ci { display: flex; align-items: flex-start; gap: 7px; padding: 5px 7px; border-radius: 5px; cursor: pointer; border: 1px solid transparent; transition: background 0.1s; }
.ci:hover { background: var(--surface2); }
.ci.ck  { background: var(--done-bg); border-color: rgba(63,185,80,0.2); }
.ci.cur { background: rgba(88,166,255,0.06); border-color: rgba(88,166,255,0.2); }
.ci-box { width: 15px; height: 15px; border-radius: 3px; border: 1.5px solid var(--border2); background: var(--bg); flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
.ci.ck .ci-box { background: var(--green); border-color: var(--green); }
.ci-check { opacity: 0; transition: opacity 0.12s; }
.ci.ck .ci-check { opacity: 1; }
.ci-body { flex: 1; }
.ci-text { font-size: 11px; color: var(--text2); line-height: 1.5; }
.ci.ck .ci-text  { text-decoration: line-through; text-decoration-color: var(--text3); color: var(--text3); }
.ci.cur .ci-text { color: var(--text); }
.nuclide { display: inline-flex; flex-direction: column; font-size: 0.78em; line-height: 1.15; vertical-align: middle; margin: 0 1px; font-family: var(--mono); }
.ci-meta { font-size: 9px; font-family: var(--mono); color: var(--text3); margin-top: 1px; }
.ci.ck .ci-meta  { color: var(--green); }
.ci.cur .ci-meta { color: var(--accent); }

/* ── QUIZ MODAL ── */
.quiz-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.78);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.quiz-overlay.open { display: flex; }
.quiz-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  box-shadow: 0 24px 80px rgba(0,0,0,0.7);
}
.quiz-modal-head {
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.quiz-modal-icon { font-size: 18px; flex-shrink: 0; line-height: 1.4; }
.quiz-modal-titles { flex: 1; }
.quiz-modal-label {
  font-size: 9px; font-family: var(--mono); letter-spacing: 0.1em;
  color: var(--purple); text-transform: uppercase; margin-bottom: 3px;
}
.quiz-modal-topic { font-size: 13px; font-weight: 700; line-height: 1.4; }
.quiz-modal-close {
  background: none; border: none; cursor: pointer;
  color: var(--text2); font-size: 20px; line-height: 1; padding: 0;
  flex-shrink: 0;
}
.quiz-modal-close:hover { color: var(--text); }

.quiz-body { padding: 16px 18px; flex: 1; }

/* 生成中 */
.quiz-loading {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 12px; padding: 40px 0;
}
.quiz-spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border2);
  border-top-color: var(--purple);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.quiz-loading-text { font-size: 12px; color: var(--text2); }

/* 問題エリア */
.quiz-question {
  font-size: 13px; font-weight: 600; line-height: 1.75;
  color: var(--text); margin-bottom: 14px;
  background: var(--surface2); border-radius: 7px; padding: 12px 14px;
  border-left: 3px solid var(--purple);
}
.quiz-type-badge {
  display: inline-block;
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.08em;
  padding: 1px 6px; border-radius: 3px; margin-bottom: 8px;
}
.quiz-type-badge.mc  { background: rgba(88,166,255,0.15); color: var(--accent); }
.quiz-type-badge.fil { background: rgba(188,140,255,0.15); color: var(--purple); }
.quiz-type-badge.txt { background: rgba(240,136,62,0.15);  color: var(--orange); }

/* 選択肢 */
.quiz-choices { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
.quiz-choice {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 12px; border-radius: 7px;
  border: 1.5px solid var(--border2);
  background: var(--surface2);
  cursor: pointer; font-size: 12px; color: var(--text2);
  transition: border-color 0.12s, background 0.12s, color 0.12s;
  text-align: left; width: 100%;
}
.quiz-choice:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
.quiz-choice.selected  { border-color: var(--accent); background: rgba(88,166,255,0.1); color: var(--text); }
.quiz-choice.correct   { border-color: var(--green);  background: rgba(63,185,80,0.12); color: var(--green); }
.quiz-choice.incorrect { border-color: #f85149; background: rgba(248,81,73,0.1); color: #f85149; }
.quiz-choice:disabled  { cursor: default; }
.quiz-choice-key {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  min-width: 18px; flex-shrink: 0; margin-top: 1px;
}

/* テキスト入力 */
.quiz-input-wrap { margin-bottom: 14px; }
.quiz-input {
  width: 100%; background: var(--surface2);
  border: 1.5px solid var(--border2); border-radius: 7px;
  padding: 10px 12px; font-size: 12px; color: var(--text);
  font-family: var(--font); resize: vertical; min-height: 80px;
  transition: border-color 0.12s;
}
.quiz-input:focus { outline: none; border-color: var(--purple); }
.quiz-input::placeholder { color: var(--text3); }

/* 結果エリア */
.quiz-result {
  border-radius: 8px; padding: 12px 14px;
  margin-bottom: 14px; font-size: 12px; line-height: 1.75;
  display: none;
}
.quiz-result.show { display: block; }
.quiz-result.pass { background: rgba(63,185,80,0.1); border: 1px solid rgba(63,185,80,0.3); color: var(--text); }
.quiz-result.fail { background: rgba(248,81,73,0.08); border: 1px solid rgba(248,81,73,0.25); color: var(--text); }
.quiz-result-head { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
.quiz-result.pass .quiz-result-head { color: var(--green); }
.quiz-result.fail .quiz-result-head { color: #f85149; }
.quiz-result-body { color: var(--text2); }

/* アクションボタン列 */
.quiz-actions {
  display: flex; gap: 8px; justify-content: flex-end;
  padding-top: 12px; border-top: 1px solid var(--border);
  flex-wrap: wrap;
}
.quiz-action-btn {
  font-family: var(--font); font-size: 12px; font-weight: 600;
  padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer;
  transition: all 0.15s;
}
.qab-submit { background: var(--purple); color: #000; }
.qab-submit:hover { background: #d4a8ff; }
.qab-submit:disabled { opacity: 0.4; cursor: default; }
.qab-check  { background: var(--green); color: #000; }
.qab-check:hover { background: #56d364; }
.qab-retry  { background: var(--surface2); color: var(--text); border: 1px solid var(--border2); }
.qab-retry:hover { border-color: var(--purple); color: var(--purple); }
.qab-next   { background: var(--accent); color: #000; }
.qab-next:hover { background: #79bbff; }
.quiz-btn {
  flex-shrink: 0;
  background: none;
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 10px;
  cursor: pointer;
  color: var(--text3);
  opacity: 0.45;
  transition: opacity 0.15s, border-color 0.15s, background 0.15s, color 0.15s;
  align-self: flex-start;
  margin-top: 2px;
  line-height: 1.5;
}
.ci:hover .quiz-btn { opacity: 1; color: var(--purple); border-color: var(--purple); }
.quiz-btn:hover { background: rgba(188,140,255,0.12); }

/* ── LESSON NOTE MODAL ── */
.note-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.78);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.note-overlay.open { display: flex; }
.note-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 100%;
  max-width: 600px;
  max-height: 88vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  box-shadow: 0 24px 80px rgba(0,0,0,0.7);
}
.note-modal-head {
  padding: 14px 18px 12px;
  border-bottom: 2px solid rgba(88,166,255,0.3);
  display: flex; align-items: flex-start; gap: 10px;
  background: linear-gradient(135deg, rgba(88,166,255,0.06), transparent);
  flex-shrink: 0;
}
.note-modal-icon { font-size: 18px; flex-shrink: 0; line-height: 1.4; }
.note-modal-titles { flex: 1; }
.note-modal-label { font-size: 9px; font-family: var(--mono); letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase; margin-bottom: 3px; }
.note-modal-title { font-size: 14px; font-weight: 700; line-height: 1.3; }
.note-modal-close { background: none; border: none; cursor: pointer; color: var(--text2); font-size: 20px; line-height: 1; padding: 0; flex-shrink: 0; }
.note-modal-close:hover { color: var(--text); }
.note-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }
.note-digest { background: rgba(88,166,255,0.08); border: 1px solid rgba(88,166,255,0.2); border-radius: 7px; padding: 11px 14px; font-size: 12px; color: var(--text); line-height: 1.75; font-weight: 500; }
.note-section { display: flex; flex-direction: column; gap: 5px; }
.note-section-heading { font-size: 11px; font-weight: 700; color: var(--text); padding-bottom: 5px; border-bottom: 1px solid var(--border); }
.note-section-body { font-size: 11px; color: var(--text2); line-height: 1.85; white-space: pre-line; }
.note-quote { background: var(--surface2); border-left: 3px solid var(--accent); border-radius: 0 6px 6px 0; padding: 10px 14px; font-size: 11px; color: var(--text2); line-height: 1.8; font-style: italic; }
.note-quote-label { font-size: 9px; font-family: var(--mono); color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; font-style: normal; }
.note-related { background: var(--surface2); border-radius: 6px; padding: 10px 14px; }
.note-related-label { font-size: 9px; font-family: var(--mono); color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.note-related-item { display: flex; align-items: flex-start; gap: 6px; font-size: 10px; color: var(--text2); margin-bottom: 3px; line-height: 1.5; }
.note-related-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 5px; }

/* ── LESSON NOTE BUTTON ── */
.note-btn {
  flex-shrink: 0;
  background: none;
  border: 1px solid var(--border2);
  border-radius: 4px;
  padding: 1px 5px;
  font-size: 10px;
  cursor: pointer;
  color: var(--text3);

.tour-backdrop {

.tour-bubble-arrow {

/* ハイライトリング */
.tour-highlight-ring {

  'm1-23': { type:'fill', question:'最も外側の電子殻にある電子を（　）電子という。（2文字）', answer:'最外殻', explanation:'最外殻電子は元素の化学的性質を決める重要な電子。この授業では「価電子」という用語は使わない。' },
  'm1-24': { type:'mc', question:'原子番号12（Mg）の最外殻電子の数はいくつか。', choices:['A. 2','B. 8','C. 10','D. 12'], answer:'A', explanation:'Mg（12）の電子配置：K2 L8 M2。最も外側のM殻に2個→最外殻電子は2個。' },
  'm1-25': { type:'mc', question:'希ガス（He, Ne, Ar）の電子配置が安定な理由として正しいものはどれか。', choices:['A. 陽子の数が特別に多いから','B. 最外殻電子が8個（Heは2個）で満たされているから','C. 中性子の数が陽子の数と等しいから','D. 電子が存在しないから'], answer:'B', explanation:'Ne：K2 L8（最外殻8個）、Ar：K2 L8 M8（最外殻8個）、He：K2（最外殻2個）。この閉殻状態が最も安定。' },
  'm1-26': { type:'mc', question:'原子番号20（Ca）の電子配置として正しいものはどれか。', choices:['A. K2 L8 M8 N2','B. K2 L8 M10','C. K2 L10 M8','D. K2 L8 M8 N0（おかしい）'], answer:'A', explanation:'電子数20：K殻2→L殻8→M殻8→N殻2。よってK2 L8 M8 N2。' },
  // ── 1学期期末 ────────────────────────────────────────────
  'f1-1': { type:'mc', question:'次のうち「電子対」の説明として正しいものはどれか。', choices:['A. 原子核の中にある2個の陽子','B. 2個1組でペアになった電子','C. 原子間で共有された1個の電子','D. 最外殻にある1個の孤立した電子'], answer:'B', explanation:'電子対＝2個1組でペアになった電子。不対電子はペアになっていない1個の電子。N原子は不対電子3個・非共有電子対1組を持つ。' },
  'f1-2': { type:'mc', question:'O原子（酸素）の電子式として、最外殻電子は何個か。', choices:['A. 4個','B. 6個','C. 8個','D. 2個'], answer:'B', explanation:'Oの原子番号は8、電子配置K2 L6。最外殻（L殻）に6個の電子があり、2組の電子対と2個の不対電子として表す。' },
  'f1-3': { type:'mc', question:'Na⁺の電子式の表し方として正しいものはどれか。', choices:['A. 電子を8個描き[ ]で囲まない','B. 電子を10個描き[ ]で囲み右上に⁺','C. 電子を8個描き[ ]で囲み右上に⁺','D. 電子を0個描き[ ]なし'], answer:'C', explanation:'Na（原子番号11）が電子1個を失いNa⁺（電子10個）になる。Ne（10個）と同じ電子配置。電子8個を最外殻に描き[ ]⁺と表す。' },
  'f1-4': { type:'mc', question:'イオン結合の説明として正しいものはどれか。', choices:['A. 2原子が電子を1個ずつ出し合って共有する結合','B. 陽イオンと陰イオンが静電気的引力で引き合う結合','C. 金属原子が自由電子を介して結合する結合','D. 分子間にはたらく弱い引力による結合'], answer:'B', explanation:'イオン結合＝陽イオン（金属）と陰イオン（非金属）が静電気的引力（クーロン力）で結合。NaClが代表例。' },
  'f1-5': { type:'mc', question:'イオン結晶の性質として誤っているものはどれか。', choices:['A. 一般に融点が高い','B. 固体状態でも電気をよく導く','C. 硬いが力を加えると割れやすい','D. 水に溶かすと電気を導く'], answer:'B', explanation:'イオン結晶は固体状態ではイオンが移動できないため導電性がない。水溶液や融解状態ではイオンが自由に動けるため導電する。' },
  'f1-6': { type:'mc', question:'NaClの結晶構造の説明として正しいものはどれか。', choices:['A. Na⁺だけが規則正しく並ぶ','B. Na⁺とCl⁻が交互に並ぶ正六面体構造','C. NaとClが共有結合でつながる','D. 分子結晶として存在する'], answer:'B', explanation:'NaCl結晶はNa⁺とCl⁻が交互に規則正しく並ぶ正六面体（立方体）構造。各イオンは6個の逆符号イオンに囲まれる。' },
  'f1-7': { type:'mc', question:'H₂Oの電子式について、Oがもつ「非共有電子対」は何組か。', choices:['A. 0組','B. 1組','C. 2組','D. 3組'], answer:'C', explanation:'H₂O：OはHと2本の共有結合（共有電子対2組）＋非共有電子対2組を持つ。計4組の電子対（最外殻6電子）。' },
  'f1-8': { type:'mc', question:'N₂の電子式に含まれる共有電子対は何組か。', choices:['A. 1組（単結合）','B. 2組（二重結合）','C. 3組（三重結合）','D. 4組'], answer:'C', explanation:'N₂はN≡Nの三重結合。共有電子対3組。各N原子に非共有電子対1組ずつある。' },
  'f1-9': { type:'mc', question:'電気陰性度が最も大きい元素はどれか。', choices:['A. H','B. O','C. F','D. Cl'], answer:'C', explanation:'電気陰性度は周期表の右上ほど大きい。最大はF（フッ素）≈4.0、次いでO≈3.4、N≈3.0、Cl≈3.2の順。' },
  'f1-10': { type:'mc', question:'HClとCl₂について「極性結合」はどちらか。', choices:['A. HClのみ','B. Cl₂のみ','C. 両方とも極性結合','D. 両方とも無極性結合'], answer:'A', explanation:'HClはHとClの電気陰性度差が大→極性結合。Cl₂は同じ元素どうしで電気陰性度差=0→無極性結合。' },
  'f1-11': { type:'mc', question:'CO₂が無極性分子である理由として正しいものはどれか。', choices:['A. C=O結合が無極性だから','B. 直線形の構造で結合の極性が打ち消し合うから','C. 共有電子対がないから','D. C原子の電気陰性度が大きいから'], answer:'B', explanation:'C=O結合は極性結合だが、CO₂は直線形（O=C=O）のため2本の極性が逆方向で打ち消し合い、分子全体では無極性。' },
  'f1-12': { type:'mc', question:'金属結合の特徴として正しいものはどれか。', choices:['A. 陽イオンと陰イオンが引き合う','B. 原子が電子を共有する','C. 金属陽イオンの格子を自由電子が動き回る','D. 分子間に弱い引力がはたらく'], answer:'C', explanation:'金属結合：金属原子が価電子を放出し、正イオンの格子中を自由電子が自由に動き回ることで結合。' },
  'f1-13': { type:'mc', question:'金属が展性・延性をもつ理由として正しいものはどれか。', choices:['A. イオン結合が強いから','B. 共有電子対が多いから','C. 力を加えてもイオン配列がずれず安定なイオン結晶だから','D. 自由電子がイオン格子のずれに追随して結合を維持するから'], answer:'D', explanation:'力を加えると金属陽イオンの格子がずれるが、自由電子が追随して結合を維持するため、割れずに延びたり広がったりできる。' },
  'f1-14': { type:'mc', question:'イオン結合・共有結合・金属結合の組み合わせで正しいものはどれか。', choices:['A. イオン：電子共有　共有：静電気力　金属：自由電子','B. イオン：静電気力　共有：電子共有　金属：自由電子','C. イオン：自由電子　共有：静電気力　金属：電子共有','D. すべて静電気力による結合'], answer:'B', explanation:'イオン結合＝陽・陰イオン間の静電気力。共有結合＝2原子間で電子を共有。金属結合＝陽イオン格子＋自由電子。' },
  'f1-15': { type:'mc', question:'共有結合の結晶の代表例として正しいものはどれか。', choices:['A. NaCl','B. CO₂（ドライアイス）','C. ダイヤモンド（C）','D. 鉄（Fe）'], answer:'C', explanation:'共有結合の結晶：ダイヤモンド(C)・SiO₂など。イオン結晶：NaCl。分子結晶：CO₂・H₂O。金属結晶：Fe・Cu。' },
  'f1-16': { type:'mc', question:'4種の結晶のうち、最も融点が高い傾向にあるものはどれか。', choices:['A. 分子結晶','B. 金属結晶','C. イオン結晶','D. 共有結合の結晶'], answer:'D', explanation:'融点の高さ：共有結合の結晶（ダイヤモンドなど）＞イオン結晶≒金属結晶＞分子結晶。共有結合の結晶は原子間の共有結合が非常に強固。' },
  'f1-17': { type:'mc', question:'黒鉛（グラファイト）が電気を導く理由として正しいものはどれか。', choices:['A. イオンが自由に動けるから','B. 層内でπ電子が自由に動けるから','C. 共有電子対が動くから','D. 自由電子を放出した金属陽イオンがあるから'], answer:'B', explanation:'黒鉛は層状構造で各炭素が3本の共有結合を形成。残り1個の電子（π電子）が層内を自由に動けるため導電性をもつ。' },
  'f1-18': { type:'mc', question:'ダイヤモンドと黒鉛はどちらも炭素のみからなるが、性質が大きく異なる。その主な理由はどれか。', choices:['A. 同位体の割合が異なるから','B. 結晶構造（結合の仕方）が異なるから','C. 原子量が異なるから','D. イオン化傾向が異なるから'], answer:'B', explanation:'ダイヤモンド：各C原子が4本の共有結合→正四面体構造→最硬・絶縁体。黒鉛：各C原子が3本の共有結合→層状構造→軟らかく導電性あり。同じ元素でも結晶構造が違えば性質が全く異なる（同素体）。' },

  // ── 2学期中間 ────────────────────────────────────────────
  'm2-1': { type:'mc', question:'相対質量の基準として正しいものはどれか。', choices:['A. 水素原子1個の質量を1とする','B. 炭素-12（¹²C）原子1個の質量を12とする','C. 陽子1個の質量を1とする','D. 電子1個の質量を1とする'], answer:'B', explanation:'相対質量は¹²C原子1個の質量を12として、それを基準にした各原子の相対的な質量。' },
  'm2-2': { type:'fill', question:'水（H₂O）の分子量を求めよ。ただしH=1, O=16とする。', answer:'18', explanation:'分子量＝原子量の総和。H₂O = 1×2 + 16×1 = 18。' },
  'm2-3': { type:'mc', question:'NaClの式量として正しいものはどれか。（Na=23, Cl=35.5）', choices:['A. 23','B. 35.5','C. 58.5','D. 59'], answer:'C', explanation:'式量＝原子量の総和。NaCl = 23 + 35.5 = 58.5。' },
  'm2-4': { type:'mc', question:'アボガドロ定数として正しいものはどれか。', choices:['A. 6.0×10²² /mol','B. 6.0×10²³ /mol','C. 6.0×10²⁴ /mol','D. 22.4 L/mol'], answer:'B', explanation:'アボガドロ定数Nₐ = 6.0×10²³ /mol。1 mol の粒子（原子・分子・イオン）の個数。' },
  'm2-5': { type:'mc', question:'水分子（H₂O）3.0 mol に含まれる分子の個数はいくつか。', choices:['A. 3.0×10²³個','B. 6.0×10²³個','C. 18×10²³個','D. 1.8×10²⁴個'], answer:'D', explanation:'個数 = mol × Nₐ = 3.0 × 6.0×10²³ = 18×10²³ = 1.8×10²⁴個。' },
  'm2-6': { type:'mc', question:'CO₂（分子量44）2.2gは何molか。', choices:['A. 0.025 mol','B. 0.05 mol','C. 0.5 mol','D. 2.5 mol'], answer:'B', explanation:'mol = 質量÷モル質量 = 2.2÷44 = 0.05 mol。' },
  'm2-7': { type:'mc', question:'標準状態で酸素（O₂）0.5 molの体積は何Lか。', choices:['A. 5.6 L','B. 11.2 L','C. 22.4 L','D. 44.8 L'], answer:'B', explanation:'体積 = mol × 22.4 L/mol = 0.5 × 22.4 = 11.2 L。' },
  'm2-8': { type:'mc', question:'CO₂ 44gに含まれる分子の個数はいくつか。（C=12, O=16, Nₐ=6.0×10²³）', choices:['A. 3.0×10²²個','B. 6.0×10²³個','C. 1.2×10²⁴個','D. 2.4×10²⁴個'], answer:'B', explanation:'CO₂のモル質量＝44 g/mol。mol = 44÷44 = 1.0 mol。個数 = 1.0 × 6.0×10²³ = 6.0×10²³個。' },
  'm2-9': { type:'mc', question:'化学反応式 2H₂ + O₂ → 2H₂O の係数が示すことはどれか。', choices:['A. 反応する物質の質量の比','B. 反応する物質の体積の比','C. 反応する物質の物質量（mol）の比','D. 反応する粒子のエネルギーの比'], answer:'C', explanation:'化学反応式の係数の比＝物質量（mol）の比。2:1:2はH₂:O₂:H₂Oのmol比を表す。' },
  'm2-10': { type:'mc', question:'Fe + O₂ → Fe₂O₃ を正しく係数合わせしたものはどれか。', choices:['A. Fe + O₂ → Fe₂O₃','B. 2Fe + O₂ → Fe₂O₃','C. 4Fe + 3O₂ → 2Fe₂O₃','D. Fe + 3O₂ → 2Fe₂O₃'], answer:'C', explanation:'Feを合わせると左辺4、右辺2×2=4。Oは左辺3×2=6、右辺2×3=6で一致。4Fe+3O₂→2Fe₂O₃。' },
  'm2-11': { type:'mc', question:'未定係数法でaCH₄+bO₂→cCO₂+dH₂O のとき、CH₄:O₂の比はどれか。', choices:['A. 1:1','B. 1:2','C. 2:1','D. 1:4'], answer:'B', explanation:'a=1とおくと：C→c=1、H→d=2、O→2b=2+2=6→b=2。よってCH₄:O₂=1:2（メタンの燃焼反応）。' },
  'm2-12': { type:'mc', question:'化学反応式の量的計算の手順として正しい順序はどれか。', choices:['A. mol比→注目物質→単位変換→答え','B. 注目2物質を決める→係数からmol比→わかっているmolを代入→比例計算','C. 質量を求める→molに変換→係数を足す','D. 個数を数える→Nₐで割る→係数比'], answer:'B', explanation:'①注目2物質を決める②係数からmol比を書く③わかっているmolを代入④比例計算で答えを求める。この4ステップが基本。' },
  'm2-13': { type:'mc', question:'2H₂+O₂→2H₂O でH₂ 3.0 molから生成するH₂Oの質量は何gか。（H=1, O=16）', choices:['A. 18g','B. 27g','C. 54g','D. 36g'], answer:'C', explanation:'H₂:H₂O=2:2=1:1のmol比。H₂ 3.0 mol→H₂O 3.0 mol。質量=3.0×18=54g。' },
  'm2-14': { type:'mc', question:'H₂ 3 molとO₂ 1 molを反応させた（2H₂+O₂→2H₂O）とき、生成するH₂Oは何molか。', choices:['A. 1 mol','B. 2 mol','C. 3 mol','D. 4 mol'], answer:'B', explanation:'H₂:O₂=2:1の比が必要。O₂ 1 molに対しH₂ 2 mol必要。H₂は3 molあるが2 molしか使えない→H₂Oは2 mol。O₂が限定試薬。' },
  'm2-15': { type:'mc', question:'標準状態でCH₄ 16gを完全燃焼（CH₄+2O₂→CO₂+2H₂O）すると生成するCO₂は何Lか。（C=12,H=1）', choices:['A. 11.2L','B. 22.4L','C. 44.8L','D. 5.6L'], answer:'B', explanation:'CH₄のモル質量=16。mol=16÷16=1mol。CH₄:CO₂=1:1より CO₂も1mol。体積=1×22.4=22.4L。' },

  // ── 2学期期末 ────────────────────────────────────────────
  'f2-1': { type:'mc', question:'アレニウスの定義で「塩基」とはどのような物質か。', choices:['A. H⁺を放出する物質','B. OH⁻を放出する物質','C. 電子を受け取る物質','D. プロトンを受け取る物質'], answer:'B', explanation:'アレニウスの定義：酸＝水中でH⁺を出す物質（例：HCl）、塩基＝水中でOH⁻を出す物質（例：NaOH）。' },
  'f2-2': { type:'mc', question:'H₂SO₄（硫酸）は何価の酸か。', choices:['A. 1価','B. 2価','C. 3価','D. 4価'], answer:'B', explanation:'H₂SO₄→2H⁺+SO₄²⁻。1分子から最大2個のH⁺を出せるので2価の酸。HCl=1価、H₃PO₄=3価。' },
  'f2-3': { type:'mc', question:'次のうち「弱酸」はどれか。', choices:['A. HCl（塩酸）','B. HNO₃（硝酸）','C. H₂SO₄（硫酸）','D. CH₃COOH（酢酸）'], answer:'D', explanation:'強酸（ほぼ100%電離）：HCl, HNO₃, H₂SO₄, HBr, HI, HClO₄。弱酸（一部のみ電離）：CH₃COOH, H₂CO₃, H₂S, HF。' },
  'f2-4': { type:'mc', question:'0.1 mol/L の酢酸水溶液の電離度が0.013のとき、電離した酢酸の濃度は何mol/Lか。', choices:['A. 0.0013 mol/L','B. 0.013 mol/L','C. 0.13 mol/L','D. 1.3 mol/L'], answer:'A', explanation:'電離した濃度 = 全体の濃度 × 電離度 = 0.1 × 0.013 = 0.0013 mol/L。' },
  'f2-5': { type:'mc', question:'溶質0.2 molを溶かして500 mLの水溶液を作ったときのモル濃度はいくつか。', choices:['A. 0.1 mol/L','B. 0.2 mol/L','C. 0.4 mol/L','D. 1.0 mol/L'], answer:'C', explanation:'モル濃度 = 溶質のmol÷溶液の体積[L] = 0.2÷0.5 = 0.4 mol/L。' },
  'f2-6': { type:'mc', question:'2.0 mol/L のNaOH水溶液200 mLを水で薄めて1000 mLにしたときのモル濃度はいくつか。', choices:['A. 0.2 mol/L','B. 0.4 mol/L','C. 1.0 mol/L','D. 10 mol/L'], answer:'B', explanation:'c₁V₁=c₂V₂。2.0×0.2=c₂×1.0。c₂=0.4 mol/L。' },
  'f2-7': { type:'mc', question:'25℃の水溶液で[H⁺]=1.0×10⁻³ mol/Lのとき、[OH⁻]はいくつか。', choices:['A. 1.0×10⁻³ mol/L','B. 1.0×10⁻¹¹ mol/L','C. 1.0×10⁻⁷ mol/L','D. 1.0×10⁻¹⁴ mol/L'], answer:'B', explanation:'Kw=[H⁺][OH⁻]=1.0×10⁻¹⁴。[OH⁻]=10⁻¹⁴÷10⁻³=1.0×10⁻¹¹ mol/L。' },
  'f2-8': { type:'mc', question:'[H⁺]=1.0×10⁻⁴ mol/Lの水溶液のpHはいくつか。', choices:['A. pH=2','B. pH=4','C. pH=10','D. pH=14'], answer:'B', explanation:'pH=-log₁₀[H⁺]=-log₁₀(10⁻⁴)=4。' },
  'f2-9': { type:'mc', question:'0.01 mol/L HClのpHはいくつか。（HClは強酸で完全電離）', choices:['A. pH=1','B. pH=2','C. pH=12','D. pH=13'], answer:'B', explanation:'HClは完全電離。[H⁺]=0.01=10⁻² mol/L。pH=-log₁₀(10⁻²)=2。' },
  'f2-10': { type:'mc', question:'pH=3の水溶液の[OH⁻]はいくつか。（25℃）', choices:['A. 1.0×10⁻³ mol/L','B. 1.0×10⁻⁷ mol/L','C. 1.0×10⁻¹¹ mol/L','D. 1.0×10⁻¹⁴ mol/L'], answer:'C', explanation:'pH=3→[H⁺]=10⁻³。[OH⁻]=Kw/[H⁺]=10⁻¹⁴÷10⁻³=10⁻¹¹ mol/L。指数の和：3+11=14。' },
  'f2-11': { type:'mc', question:'NaOHとHClの中和反応の化学反応式として正しいものはどれか。', choices:['A. NaOH+HCl→NaCl+H₂O','B. NaOH+HCl→Na+Cl+H₂O','C. NaOH+2HCl→NaCl₂+H₂O','D. 2NaOH+HCl→NaCl+2H₂O'], answer:'A', explanation:'酸+塩基→塩+水。NaOH（1価塩基）+HCl（1価酸）→NaCl（塩）+H₂O。' },
  'f2-12': { type:'mc', question:'中和の量的関係で正しいものはどれか。', choices:['A. 酸のmol = 塩基のmol','B. 酸の体積 = 塩基の体積','C. 酸の価数×mol = 塩基の価数×mol','D. 酸の濃度 = 塩基の濃度'], answer:'C', explanation:'中和の条件：酸から出るH⁺のmol = 塩基から出るOH⁻のmol。つまり（価数×mol）が等しい。' },

const HINTS = {
  '混合物・純物質の定義':'混合物は2種類以上の純物質が混ざったもの（例：食塩水・空気・合金）。純物質は1種類の物質だけからなるもの（例：水・鉄・エタノール）。「純粋な物質」という意味。',
  '混合物・純物質の例':'混合物の例：食塩水、空気、石油。純物質の例：水(H₂O)、鉄(Fe)、塩化ナトリウム(NaCl)、酸素(O₂)。純物質はさらに単体と化合物に分類される。',
  '分離の定義':'混合物から純物質を取り出す操作を「分離」という。物質の化学的な性質は変えずに、物理的な性質の違いを利用して行う。',
  'ろ過の操作':'固体と液体の混合物を分離する方法。粒子の大きさの違いを利用。ガラス棒に伝わらせて注ぐ・ろ紙はひだをつける・ろうとの足は長い方をビーカーの壁につけるなど操作の注意点も重要。',
  '蒸留の操作':'液体混合物を沸点の差を利用して分離する方法。加熱して蒸発させ、冷却して再び液体に戻す（凝縮）。温度計の先端は枝付きフラスコの枝の分岐部に合わせる。',
  'その他の分離方法':'再結晶：溶解度の温度差を利用。抽出：溶媒への溶けやすさの違いを利用。クロマトグラフィー：吸着力の違いを利用。分留：沸点の差を利用（石油の精製など）。昇華：固体が直接気体になる性質を利用。',
  '元素・単体・化合物の定義':'元素＝物質を構成する成分の種類（H, O, Naなど）。単体＝1種類の元素だけからなる純物質（H₂, O₂, Fe）。化合物＝2種類以上の元素からなる純物質（H₂O, NaCl, CO₂）。',
  '元素と単体の使い分け':'「水素」→元素として使う場合（水素原子が含まれる意味）と、単体（H₂ガス）を指す場合がある。文脈で判断。「水は水素と酸素からなる」→元素。「水素は可燃性の気体だ」→単体。',
  '単体・化合物の分類練習':'Fe(鉄)→単体、H₂O(水)→化合物、NaCl(食塩)→化合物、O₂(酸素)→単体、NH₃(アンモニア)→化合物、Cu(銅)→単体。「何種類の元素からなるか」で判断。',
  '原子番号1〜20の暗記':'H He Li Be B C N O F Ne Na Mg Al Si P S Cl Ar K Ca。「スイヘイリーベ僕の船、七曲がりシップスクラークか」などの語呂で覚える。21番以降は試験中に周期表を配布。',
  '炎色反応の色':'Li(リチウム)→赤、Na(ナトリウム)→黄、K(カリウム)→紫（赤紫）、Ca(カルシウム)→橙赤、Sr(ストロンチウム)→紅（深赤）、Ba(バリウム)→黄緑、Cu(銅)→青緑。語呂：「リアカーなき、K村、動力借りようとするもくれない」',
  '炎色反応で検出できること':'炎色反応でわかるのは「その物質に含まれる元素の種類」。金属元素の検出に使う。Na（黄）は少量でも非常に鮮明に見えるので、他の色が見えにくいことがある。',
  '沈殿反応による元素検出':'硝酸銀(AgNO₃)水溶液を加えて白色沈殿→塩素(Cl)の存在を示す（塩化銀AgClが沈殿）。石灰水(Ca(OH)₂)を白濁させる→炭素(C)の存在（CO₂が生成したから）。プリントに載っている範囲で覚える。',
  '成分元素の検出まとめ':'炎色反応→金属元素の種類を確認。沈殿反応（AgNO₃など）→ハロゲン(Cl等)の有無を確認。石灰水→炭素(C)の有無。塩化コバルト紙が青→赤に変色→水素(H)と酸素(O)の存在（水の存在）。',
  '原子の構造の図示':'原子核（中心）に陽子(+)と中性子が集まり、外側の電子殻を電子(−)が回る。原子全体のサイズ10⁻¹⁰m、原子核は10⁻¹⁵m（原子の10万分の1）。',
  '原子番号と粒子数の関係':'原子は電気的に中性→陽子の数(+) = 電子の数(−)。原子番号は陽子の数で定義される。だから原子番号 = 陽子の数 = 電子の数。',
  '質量数・中性子数の計算':'質量数 = 陽子の数 + 中性子の数。中性子の数 = 質量数 − 原子番号。例：<span class="nuclide"><span>12</span><span>6</span></span>C → 陽子6・中性子6・電子6。<span class="nuclide"><span>23</span><span>11</span></span>Na → 陽子11・中性子12・電子11。',
  '元素記号の表記の読み方':'左上＝質量数、左下＝原子番号（省略される場合も）。例：³⁵₁₇Cl → 原子番号17(陽子17=電子17)、質量数35、中性子数35−17=18。即座に計算できるよう練習する。',
  '同位体の定義と選び方':'同位体＝陽子数（原子番号）が同じで、中性子数（質量数）が異なる原子。例：₁¹H と ₂¹H と ₃¹H。同じ元素記号・異なる質量数の核種を選べばよい。',
  '同位体の化学的性質':'同位体は陽子数が同じ＝電子の数が同じ。化学反応は電子の動きで決まるので、同位体の化学的性質はほぼ同じ。質量が異なるので物理的性質（沸点など）はわずかに異なる。',
  '電子殻と収容数':'K殻：最大2個、L殻：最大8個、M殻：最大18個（高校では8個で扱う）。内側から順に埋まっていく。各殻の最大収容数 = 2n²（n=1,2,3…）。',
  '電子配置の書き方':'原子番号順に内側の殻から電子を配置。Na(11)→K2 L8 M1。Ca(20)→K2 L8 M8 L2。書く手順：原子番号から電子の総数を確認→K殻から順に配置。',
  '最外殻電子の定義':'最も外側の電子殻（最外殻）にある電子のこと。※この授業では「価電子」という用語は使わない。最外殻電子の数が元素の化学的性質に大きく関係する。',
  '最外殻電子数の読み取り':'電子配置を書いてから、一番外側の数字を読む。例：Na(K2 L8 M1)→最外殻電子1個、Cl(K2 L8 M7)→最外殻電子7個。原子番号1〜20について即答できるよう練習する。',
  '希ガスの安定な電子配置':'He(K2)、Ne(K2 L8)、Ar(K2 L8 M8)のように最外殻が2個か8個で満たされた状態（閉殻）は非常に安定。希ガスは反応しにくいのはこのため。他の原子もこの状態を目指す（イオン・結合形成の理由）。',
  '節末チェック（p25・30・41）':'教科書p25（物質の分類）、p30（原子の構造）、p41（電子配置）の節末チェック問題を自分で解いて、解答(p187)で確認する。間違えた問題は用語の定義に戻って考え直す。',
  '電子対・不対電子の定義':'電子対 = 2個1組でペアになった電子（非共有電子対と共有電子対）。不対電子 = 1個で対なし。N原子：不対電子3個＋非共有電子対1個。',
  '原子の電子式':'最外殻電子をドット（・）で原子記号の上下左右に書く。O：6個（対2組＋不対2個）、Cl：7個（対3組＋不対1個）。',
  'イオンの電子式':'イオンの電子式は[ ]に入れて右上にイオンの電荷を書く。例：[Na]⁺, [:Cl:]⁻。',
  'イオン結合の定義':'陽イオン（金属）と陰イオン（非金属）が静電気的引力（クーロン力）で結合。',
  'イオン結晶の性質':'硬いが割れやすい（劈開）・融点高・固体では導電性なし・溶液や融解すると導電。',
  'イオン結晶の構造':'NaClは Na⁺ と Cl⁻ が交互に並ぶ正六面体構造。各イオンは6個の逆符号イオンに囲まれる。',
  '共有結合と電子式':'2原子が電子を1個ずつ出し合って電子対を共有。共有電子対（結合）と非共有電子対を区別して書く。H₂O：O が2組の非共有電子対と2本の結合。',
  '多重結合の電子式':'2重結合は電子対2組を共有、3重結合は3組。N₂ は :N≡N: （三重結合＋各1組の非共有電子対）。CO₂ は O=C=O。',
  '電気陰性度':'原子が結合中の電子対を引き寄せる強さ。F が最大（約4.0）、周期表で右上ほど大きく左下ほど小さい。',
  '極性・非極性の判定':'電気陰性度差が大きい結合は極性結合。分子全体では結合の極性ベクトルの合計→0なら無極性（CO₂）、0でなければ極性（H₂O）。',
  '分子の極性と形':'直線形のCO₂は極性が打ち消し合い無極性。折れ線形のH₂Oは打ち消されず極性分子。形を先に決めてから考える。',
  '金属結合と自由電子':'金属原子が価電子を放出し、正イオンの格子中を自由電子が動き回る。',
  '金属の性質':'自由電子が動くので電気・熱伝導性大。格子がずれても自由電子が結合を維持→展性・延性。',
  '3種の化学結合の比較':'イオン：陽イオン↔陰イオン（静電気力）。共有：原子↔原子（電子対共有）。金属：陽イオン↔自由電子（静電気力）。',
  '結晶の種類と代表例':'イオン：NaCl, CaCO₃。共有：ダイヤモンド, SiO₂。分子：ドライアイス(CO₂), 氷(H₂O)。金属：Fe, Cu, Al。',
  '結晶の性質比較':'融点：共有>イオン≒金属>分子。硬さ：共有>イオン>金属>分子。電気伝導：金属>（イオン：溶融・溶液時）>共有, 分子（絶縁）。',
  '共有結晶の同素体':'ダイヤモンド：正四面体構造、最硬、絶縁体。黒鉛：層状構造、層間は弱い、電気伝導体（自由電子的なπ電子）。',
  '結合・結晶の総合演習':'物質→構成粒子の種類を判断→結合の種類→結晶の種類→性質の順で系統的に考える。',
  '相対質量の定義':'¹²C 原子1個の質量を12と決め、それを基準にした相対的な質量。H≈1.008≒1、O≈16.00≒16。',
  '主要元素の原子量':'H=1, C=12, N=14, O=16, Na=23, Mg=24, Al=27, S=32, Cl=35.5, K=39, Ca=40。これを基本として分子量・式量を計算する。',
  '分子量・式量の計算':'H₂O = 2×1+16 = 18。NaCl = 23+35.5 = 58.5。CaCO₃ = 40+12+3×16 = 100。',
  'アボガドロ定数':'1 mol = 6.0×10²³ 個（アボガドロ定数 Nₐ）。原子・分子・イオンなど粒子の数を mol で表す際の変換定数。',
  'mol と個数の換算':'個数 = mol × 6.0×10²³。mol = 個数 ÷ 6.0×10²³。',
  'mol と質量の換算':'質量[g] = mol × モル質量[g/mol]。mol = 質量 ÷ モル質量。モル質量の数値 = 分子量（式量）。',
  'mol と気体体積の換算':'標準状態（0℃, 1 atm）で気体 1 mol = 22.4 L。体積 = mol × 22.4。mol = 体積 ÷ 22.4。',
  'mol 換算の混合問題':'「個数→mol（÷Nₐ）→質量（×M）→体積（×22.4）」の換算マップを頭に入れ、必要なルートを選ぶ。',
  '化学反応式の係数の意味':'2H₂ + O₂ → 2H₂O の係数 2:1:2 = 物質量の比（mol の比）。質量の比ではない点に注意。',
  '化学反応式の係数合わせ':'①両辺の原子種を確認 ②一番複雑な分子から係数を仮定 ③順に原子数を合わせる ④分数なら全体を整数倍。',
  '未定係数法':'各物質に a, b, c … を置き、各元素の原子数について方程式を立てて解く。1つを1とおいて連立する。',
  '量的関係の計算手順':'①注目する2物質を決める ②係数から mol 比を書く ③わかっている mol を代入 ④比例計算で求める。',
  '量的関係の基本問題':'2H₂+O₂→2H₂O で H₂:H₂O = 2:2 = 1:1。H₂ 3 mol なら H₂O も 3 mol = 3×18 = 54 g。',
  '限定試薬':'両方の試薬の mol を計算し、係数比で必要量を比べる。少ない方（限定試薬）に合わせて生成量が決まる。',
  '量的関係の総合問題':'単位変換（g→mol, L→mol, 個→mol）→係数比→単位変換の流れを確実にマスターする。',
  '酸塩基のアレニウス定義':'酸 = 水中で H⁺ を出す（HCl→H⁺+Cl⁻）。塩基 = 水中で OH⁻ を出す（NaOH→Na⁺+OH⁻）。',
  '酸の価数':'1分子が出せる H⁺ の最大数。HCl=1価, H₂SO₄=2価, H₃PO₄=3価。',
  '強酸・弱酸の分類':'強酸（ほぼ100%電離）：HCl, HBr, HI, H₂SO₄, HNO₃, HClO₄。弱酸（一部のみ電離）：CH₃COOH, H₂CO₃, H₂S, HF, H₃PO₄。',
  '電離度の定義と計算':'α = 電離した物質量 / 溶解した物質量。強電解質 α≈1, 弱電解質 α≪1。0.1 mol/L 酢酸で α=1.3%なら電離した量 = 0.1×0.013 = 0.0013 mol/L。',
  'モル濃度の計算':'c = n/V。c[mol/L], n[mol], V[L]。n = c×V は中和計算で頻出。',
  '濃度変換の計算':'ρ[g/mL]、w[%]、M[g/mol]とすると c = 1000ρw / (100M) [mol/L]。',
  '希釈計算':'c₁V₁ = c₂V₂（溶質のmolは変わらない）。',
  '水のイオン積 Kw':'25℃で Kw = [H⁺][OH⁻] = 1.0×10⁻¹⁴。酸性：[H⁺]>10⁻⁷, 中性：[H⁺]=10⁻⁷, 塩基性：[H⁺]<10⁻⁷。',
  'pH の計算':'pH = −log₁₀[H⁺]。[H⁺]=10⁻ⁿ なら pH=n。0.01 mol/L HCl →[H⁺]=10⁻² → pH=2。',
  '強酸・強塩基の pH 計算':'強酸は完全電離→[H⁺] = 価数×濃度。強塩基は[OH⁻]を求め、Kw から[H⁺]を計算。',
  '[H⁺] と [OH⁻] の関係':'[H⁺]=10⁻ᵃ, [OH⁻]=10⁻ᵇ のとき a+b=14（25℃）。pH=3 なら[OH⁻]=10⁻¹¹ mol/L。',
  '中和反応の化学式':'H⁺ + OH⁻ → H₂O が基本。イオン反応式で書くと明確。NaOH+HCl → NaCl+H₂O。',
  '中和の量的関係式':'（酸の価数）×（酸の濃度[mol/L]）×（体積[L]）=（塩基の価数）×（塩基の濃度）×（体積）。H⁺ の mol = OH⁻ の mol が根拠。',
  '中和計算の基本問題':'H₂SO₄（2価）0.05 mol/L × V₁ × 2 = NaOH（1価）0.1 mol/L × V₂ × 1 の形で方程式を立てる。',
  '塩の生成と分類':'強酸+強塩基→中性塩（NaCl）。弱酸+強塩基→弱塩基性（CH₃COONa）。強酸+弱塩基→弱酸性（NH₄Cl）。',
  '滴定器具の使い方':'ビュレット：一定量ずつ滴下・体積を精密読取。ホールピペット：一定体積を正確に量る。メスフラスコ：一定体積の溶液を調製。',
  '指示薬と変色域':'フェノールフタレイン：酸性→無色, 塩基性→赤（pH 8.3〜10）。強酸×強塩基の滴定に使用。メチルオレンジ：酸性→赤, 塩基性→黄（pH 3.1〜4.4）。弱塩基×強酸の滴定に使用。',
  '滴定曲線の読み方':'強酸×強塩基：当量点 pH≈7、S字形の急激な変化。弱酸×強塩基：当量点 pH>7（塩の加水分解）。当量点をまたぐ変色域の指示薬を選ぶ。',
  '滴定計算':'滴定は中和の量的関係を使う。未知濃度 c = （既知の価数×濃度×体積）/（未知の価数×体積）で計算。',
  '実験レポートの書き方':'目的・操作・結果（数値）・計算・考察（誤差の原因・検討）の順で書く。誤差の原因：器具の不正確な読み取り、洗浄不足、終点のずれなど。',
  '酸素の授受による酸化還元':'酸素を得る → 酸化。酸素を失う → 還元。例：2Cu+O₂ → 2CuO（Cuが酸化）。',
  '電子の授受による酸化還元':'電子を失う（e⁻ を出す）→ 酸化。電子を得る（e⁻ を受け取る）→ 還元。酸化と還元は必ず同時に起こる。',
  '2つの定義の対応確認':'Cu → Cu²⁺ + 2e⁻（電子を失う = 酸化）。CuO で見ると Cu は O を得ている = 酸化。両定義が一致する。',
  '酸化数のルール':'①単体の酸化数=0 ②単原子イオン=電荷 ③化合物中のH=+1（金属水素化物は−1）④O=−2（過酸化物は−1）⑤化合物の総和=0 ⑥多原子イオンの総和=電荷。',
  '酸化数の計算手順':'例）MnO₄⁻：①Mn=x, O=−2 ②x+4×(−2)=−1 ③x=+7。手順：物質の区別→原子の書き出し→未知をx→合計→確定。',
  '多原子イオンの酸化数':'Cr₂O₇²⁻：2x+7×(−2)=−2 → x=+6。K₂Cr₂O₇ の Cr は +6価。',
  '酸化・還元の特定':'酸化数が増加した原子が酸化された（酸化剤に含まれる）。酸化数が減少した原子が還元された（還元剤に含まれる）。',
  '酸化剤・還元剤の定義':'酸化剤 = 相手を酸化する（自分は還元される、電子を受け取る）。還元剤 = 相手を還元する（自分は酸化される、電子を渡す）。',
  '酸化剤の半反応式':'KMnO₄（酸性）：MnO₄⁻+8H⁺+5e⁻ → Mn²⁺+4H₂O。書き方：①O個数に合わせてH₂Oを追加 ②H個数に合わせてH⁺を追加 ③電荷を合わせてe⁻を追加。',
  '還元剤の半反応式':'Fe²⁺：Fe²⁺ → Fe³⁺+e⁻。H₂S：H₂S → S+2H⁺+2e⁻。',
  '半反応式の組合せ':'酸化剤×（還元剤のe⁻係数）+ 還元剤×（酸化剤のe⁻係数）でe⁻を消す。整数倍して辺々加える。',
  'イオン化列の暗記':'K・Ca・Na・Mg・Al・Zn・Fe・Ni・Sn・Pb・H・Cu・Hg・Ag・Pt・Au。語呂合わせ：「貸そかな、まあ当てにすな、ひどすぎる借金」など。',
  'イオン化傾向と反応性':'H₂ より左：H₂SO₄（希）と反応。Ca より右/K より左：水と反応。Cu より左/Pb より右：酸に溶ける。Cu, Ag は熱濃H₂SO₄ や希HNO₃ に溶ける。',
  '電池とイオン化傾向の関係':'イオン化傾向が大きい金属が負極（酸化）、小さい金属が正極（還元）。差が大きいほど起電力が大きい。',
  'ダニエル電池の反応式':'負極：Zn → Zn²⁺+2e⁻（酸化）。正極：Cu²⁺+2e⁻ → Cu（還元）。起電力 = 1.1 V。',
  '鉛蓄電池':'放電（負極）：Pb+SO₄²⁻ → PbSO₄+2e⁻。放電（正極）：PbO₂+SO₄²⁻+4H⁺+2e⁻ → PbSO₄+2H₂O。充電は逆反応。',
  'ファラデーの法則':'電気量Q[C] = 電流I[A]×時間t[s]。1 mol の e⁻ = 96500 C（ファラデー定数F）。析出 mol = Q/(n×F)（n は価数）。',
  '酸化還元滴定の計算':'酸化剤の受け取るe⁻ mol = 還元剤の放出するe⁻ mol が基本。KMnO₄（5価変化）×mol = Fe²⁺（1価変化）×mol×（係数比）で立式。',
  '酸化還元の総合演習':'①酸化数変化の特定 ②半反応式の組合せ ③量的関係の計算 の3ステップを系統的に練習する。',
};

let state = {
  scopeId: null,
  currentHour: 1,
  checked: JSON.parse(localStorage.getItem('chem_nav') || '{}'),
};
const save = () => localStorage.setItem('chem_nav', JSON.stringify(state.checked));
const scope = () => SCOPES.find(s => s.id === state.scopeId);
function allItems(sc) { return sc ? sc.phases.flatMap(p => p.items) : []; }
function doneCount(sc) { return allItems(sc).filter(i => state.checked[i.id]).length; }
function hourState(sc, h) {
  const its = allItems(sc).filter(i => i.h === h);
  if (!its.length) return 'future';
  const d = its.filter(i => state.checked[i.id]).length;
  if (h === state.currentHour) return 'current';
  if (d === its.length) return 'done';
  if (d > 0) return 'partial';
  return 'future';
}
function phaseState(phase) {
  const d = phase.items.filter(i => state.checked[i.id]).length;
  if (d === phase.items.length) return 'done';
  const inRange = state.currentHour >= phase.hRange[0] && state.currentHour <= phase.hRange[phase.hRange.length-1];
  if (inRange) return 'active';
  if (d > 0) return 'partial';
  return 'future';
}

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let head = sb.querySelector('.sidebar-head');
  if (!head) { head = document.createElement('div'); head.className = 'sidebar-head'; head.textContent = '試験範囲'; }
  sb.innerHTML = ''; sb.appendChild(head);

  // ホームボタン
  const homeBtn = document.createElement('button');
  homeBtn.className = 'scope-btn home-btn' + (!state.scopeId ? ' active' : '');
  homeBtn.innerHTML = `<div class="scope-btn-top"><span class="scope-btn-name">🗺 年間ロードマップ</span></div><div class="scope-mini-meta"><span>全体を一覧で確認</span></div>`;
  homeBtn.onclick = () => { state.scopeId = null; renderAll(); };
  sb.appendChild(homeBtn);

  const divider = document.createElement('div');
  divider.style.cssText = 'height:1px;background:var(--border);margin:4px 0';
  sb.appendChild(divider);

  SCOPES.forEach(sc => {
    const total = allItems(sc).length, done = doneCount(sc);
    const btn = document.createElement('button');
    btn.className = 'scope-btn' + (state.scopeId === sc.id ? ' active' : '');
    btn.innerHTML = `
      <div class="scope-btn-top"><span class="scope-btn-name">${sc.name}</span><span class="scope-term">${sc.term}</span></div>
      <div class="scope-mini-meta"><span>${sc.desc}</span><span>${done}/${total}</span></div>
      <div class="scope-mini-bar"><div class="scope-mini-fill" style="width:${total?done/total*100:0}%"></div></div>
    `;
    btn.onclick = () => { state.scopeId = sc.id; state.currentHour = 1; renderAll(); };
    sb.appendChild(btn);
  });

  // 録音ログボタン（サイドバー最下部）
  // 授業の受け方ボタン
  const howBtn = document.createElement('button');
  howBtn.className = 'scope-btn' + (state.scopeId === '__how__' ? ' active' : '');
  howBtn.style.borderLeftColor = state.scopeId === '__how__' ? 'var(--orange)' : 'transparent';
  howBtn.innerHTML = `<div class="scope-btn-top">
    <span class="scope-btn-name">📖 授業の受け方</span>
  </div><div class="scope-mini-meta"><span>録音・哲学・評価の運用</span></div>`;
  howBtn.onclick = () => { state.scopeId = '__how__'; renderAll(); };
  sb.appendChild(howBtn);

  const logDivider = document.createElement('div');
  logDivider.style.cssText = 'flex:1';  // 残りスペースを埋めてログボタンを下に押し出す
  sb.appendChild(logDivider);

  const logSep = document.createElement('div');
  logSep.style.cssText = 'height:1px;background:var(--border);';
  sb.appendChild(logSep);

  const logBtn = document.createElement('button');
  logBtn.className = 'scope-btn' + (state.scopeId === '__log__' ? ' active' : '');
  logBtn.style.borderLeftColor = state.scopeId === '__log__' ? 'var(--accent)' : 'transparent';
  logBtn.innerHTML = `<div class="scope-btn-top"><span class="scope-btn-name" style="font-size:11px;color:var(--text3)">🎙 授業録音ログ</span>
    <span class="scope-term" style="background:rgba(63,185,80,0.1);color:var(--green);border-color:rgba(63,185,80,0.3)">${RECORDING_LOG.length}件</span>
  </div>`;
  logBtn.onclick = () => { state.scopeId = '__log__'; renderAll(); };
  sb.appendChild(logBtn);

  // モバイル用：使い方ボタン（サイドバー内）
  const mobileTourBtn = document.createElement('button');
  mobileTourBtn.className = 'scope-btn';
  mobileTourBtn.style.cssText = 'display:none';
  mobileTourBtn.innerHTML = `<div class="scope-btn-top"><span class="scope-btn-name" style="font-size:11px;color:var(--text3)">？ 使い方（チュートリアル）</span></div>`;
  mobileTourBtn.onclick = () => startTour();
  if (window.innerWidth <= 768) mobileTourBtn.style.display = '';
  sb.appendChild(mobileTourBtn);
}

function renderHowPage() {

  document.getElementById('headerBadge').textContent = '';
  main.innerHTML = '';

  header.className = 'home-summary';
  header.innerHTML = `
    <div class="home-summary-left">
      <div class="home-title">📖 授業の受け方</div>
      <div class="home-subtitle">録音の意図・先生の学習哲学・評価とコメントシートの活用法</div>
    </div>`;
  main.appendChild(header);

  const cardWrap = document.createElement('div');
  cardWrap.style.cssText = 'display:flex;flex-direction:column;gap:12px;padding-bottom:24px;';
  main.appendChild(cardWrap);

  const noteKeys = ['lesson_m1_recording', 'lesson_m1_philosophy', 'lesson_m1_evaluation'];
  const icons    = ['🎙', '💡', '📋'];
  const colors   = ['var(--accent)', 'var(--orange)', 'var(--green)'];

  noteKeys.forEach((key, i) => {
    const note = LESSON_NOTES[key];
    if (!note) return;

    const card = document.createElement('div');
    card.style.cssText = `
      background:var(--surface);border:1px solid var(--border);border-radius:10px;
      overflow:hidden;border-top:3px solid ${colors[i]};
    `;

    // カードヘッダー（クリックで展開）
    const cardHead = document.createElement('div');
    cardHead.style.cssText = 'padding:14px 18px 12px;cursor:pointer;display:flex;align-items:flex-start;gap:10px;';
    cardHead.innerHTML = `
      <span style="font-size:20px;flex-shrink:0">${icons[i]}</span>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:700;margin-bottom:3px">${note.title}</div>
        <div style="font-size:11px;color:var(--text2);line-height:1.6">${note.digest}</div>
      </div>
      <span class="how-toggle" style="font-size:16px;color:var(--text3);flex-shrink:0;transition:transform 0.2s">▼</span>
    `;
    card.appendChild(cardHead);

    // カード本体（セクション一覧）
    const cardBody = document.createElement('div');
    cardBody.style.cssText = 'padding:0 18px 16px;display:flex;flex-direction:column;gap:12px;';

    note.sections.forEach(sec => {
      const s = document.createElement('div');
      s.className = 'note-section';
      s.innerHTML = `<div class="note-section-heading">${sec.heading}</div>
        <div class="note-section-body">${sec.body}</div>`;
      cardBody.appendChild(s);
    });

    if (note.teacherQuote) {
      const q = document.createElement('div');
      q.className = 'note-quote';
      q.innerHTML = `<div class="note-quote-label">🎤 先生の言葉</div>${note.teacherQuote}`;
      cardBody.appendChild(q);
    }

    card.appendChild(cardBody);

    // トグル開閉
    let open = true;
    cardHead.addEventListener('click', () => {
      open = !open;
      cardBody.style.display = open ? '' : 'none';
      const toggle = cardHead.querySelector('.how-toggle');
      if (toggle) toggle.style.transform = open ? 'rotate(0deg)' : 'rotate(-90deg)';
    });

    cardWrap.appendChild(card);
  });
}

    fileRow.innerHTML = `<span style="color:var(--text2)">📄</span>${log.filename}`;
    card.appendChild(fileRow);

    // トピック
    const topicsRow = document.createElement('div');
    topicsRow.style.cssText = 'padding:10px 16px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:5px;';
    log.topics.forEach(t => {
      const tag = document.createElement('span');
      tag.style.cssText = 'font-size:10px;background:var(--surface2);border:1px solid var(--border2);padding:2px 8px;border-radius:10px;color:var(--text2);';
      tag.textContent = t;
      topicsRow.appendChild(tag);
    });
    card.appendChild(topicsRow);

    // 対応チェック項目
    const itemsSection = document.createElement('div');
    itemsSection.style.cssText = 'padding:10px 16px;';

    const itemsLabel = document.createElement('div');
    itemsLabel.style.cssText = 'font-size:9px;font-family:var(--mono);color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:7px;';
    itemsLabel.textContent = `📋 対応チェック項目（${log.relatedItems.length}件）`;
    itemsSection.appendChild(itemsLabel);

    // 対応するスコープとアイテムを探す
    const sc = SCOPES.find(s => s.id === log.scope.replace('1学期中間','mid1').replace('1学期期末','fin1').replace('2学期中間','mid2').replace('2学期期末','fin2').replace('3学期','term3'));
    const scopeId = log.scope === '1学期中間' ? 'mid1' : log.scope === '1学期期末' ? 'fin1' : log.scope === '2学期中間' ? 'mid2' : log.scope === '2学期期末' ? 'fin2' : 'term3';
    const targetSc = SCOPES.find(s => s.id === scopeId);

    if (targetSc) {
      const allIt = allItems(targetSc);
      log.relatedItems.forEach(id => {
        const item = allIt.find(i => i.id === id);
        if (!item) return;
        const ck = state.checked[id];
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:flex-start;gap:7px;padding:4px 6px;border-radius:4px;margin-bottom:2px;cursor:pointer;';
        row.style.background = ck ? 'rgba(63,185,80,0.07)' : 'var(--surface2)';
        row.innerHTML = `
          <span style="width:14px;height:14px;border-radius:3px;border:1.5px solid;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;
            ${ck ? 'background:var(--green);border-color:var(--green)' : 'background:var(--bg);border-color:var(--border2)'}">
            ${ck ? '<svg width="9" height="9" viewBox="0 0 9 9"><polyline points="1,4.5 3.5,7 8,1.5" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>' : ''}
          </span>
          <span style="font-size:10px;line-height:1.6;${ck ? 'color:var(--text3);text-decoration:line-through' : 'color:var(--text2)'}">${item.text.replace(/<[^>]+>/g,'')}</span>
        `;
        row.onclick = () => { state.scopeId = scopeId; state.currentHour = item.h; renderAll(); setTimeout(()=>{ const el=document.getElementById('pc-'+targetSc.phases.find(p=>p.items.find(i=>i.id===id))?.id); if(el)el.scrollIntoView({behavior:'smooth',block:'center'}); },100); };
        itemsSection.appendChild(row);
      });
    }

    // 授業メモを開くボタン
    if (log.noteKey && LESSON_NOTES[log.noteKey]) {
      const noteBtn = document.createElement('button');
      noteBtn.style.cssText = 'margin-top:10px;background:rgba(88,166,255,0.1);border:1px solid rgba(88,166,255,0.3);color:var(--accent);padding:5px 14px;border-radius:5px;font-size:11px;cursor:pointer;font-family:var(--font);';
      noteBtn.textContent = '📝 授業メモを見る';
      noteBtn.onclick = () => openNoteModal(LESSON_NOTES[log.noteKey], null);
      itemsSection.appendChild(noteBtn);
    }

    card.appendChild(itemsSection);
    cardList.appendChild(card);
  });
}

function renderHome() {
  const main = document.getElementById('main');
  document.getElementById('headerBadge').textContent = '';
  main.innerHTML = '';

  const totalAll = SCOPES.reduce((s,sc)=>s+allItems(sc).length,0);
  const doneAll  = SCOPES.reduce((s,sc)=>s+doneCount(sc),0);
  const pctAll   = totalAll ? Math.round(doneAll/totalAll*100) : 0;

  // ── サマリー
  const summary = document.createElement('div');
  summary.className = 'home-summary';
  summary.innerHTML = `
    <div class="home-summary-left">
      <div class="home-title">必修化学　年間学習ロードマップ</div>
      <div class="home-subtitle">各試験範囲にマウスを乗せるとキーワードマップが表示されます　／　クリックでチェックリストへ</div>
    </div>
    <div class="home-summary-right">
      <div class="ov-stat"><div class="ov-num g">${doneAll}</div><div class="ov-lbl">完了</div></div>
      <div class="ov-stat"><div class="ov-num b">${totalAll}</div><div class="ov-lbl">合計</div></div>
      <div class="ov-stat"><div class="ov-num o">${pctAll}%</div><div class="ov-lbl">達成率</div></div>
    </div>
  `;
  main.appendChild(summary);

  const scopeMeta = [
    { id:'mid1',  label:'1学期\n中間', term:'5月',  color:'#388bfd' },
    { id:'fin1',  label:'1学期\n期末', term:'7月',  color:'#bc8cff' },
    { id:'mid2',  label:'2学期\n中間', term:'10月', color:'#3fb950' },
    { id:'fin2',  label:'2学期\n期末', term:'12月', color:'#f0883e' },
    { id:'term3', label:'3学期',       term:'2月',  color:'#ff7b72' },
  ];

  // ── ノードカードをHTML divで直接作る（SVGなし）
  // ツールチップ要素（mapWrapの外、mainの直下）
  const tooltip = document.createElement('div');
  tooltip.className = 'phase-tooltip';
  // position:fixed で使うので body 直下に置く
  document.body.appendChild(tooltip);

  const mapWrap = document.createElement('div');
  mapWrap.className = 'roadmap-map-wrap';
  // カード5枚 + 矢印4本 を grid で均等配置
  mapWrap.style.cssText = 'display:grid;grid-template-columns:1fr 28px 1fr 28px 1fr 28px 1fr 28px 1fr;align-items:stretch;padding:14px 12px 16px;width:100%;box-sizing:border-box;';

  let hideTimer = null;

  scopeMeta.forEach((meta, idx) => {
    // 矢印
    if (idx > 0) {
      const arrow = document.createElement('div');
      arrow.style.cssText = 'color:#2e3a55;font-size:14px;text-align:center;align-self:center;user-select:none;';
      arrow.textContent = '→';
      mapWrap.appendChild(arrow);
    }

    const sc  = SCOPES.find(s => s.id === meta.id);
    const tot = allItems(sc).length;
    const dn  = doneCount(sc);
    const pct = tot ? dn / tot : 0;

    // 期ラベル（モバイルではringWrap上部に、PCではcard直下に）
    const card = document.createElement('div');
    card.className = 'home-map-card';
    card.style.cssText = `
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid ${meta.color}66;
      border-radius: 10px;
      padding: 10px 8px 10px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      position: relative;
      box-sizing: border-box;
    `;

    // リングSVG（常にPC構造、モバイル変換はCSSで）
    const ringSize = 56;
    const R   = 24;
    const circ = 2 * Math.PI * R;

    const termEl = document.createElement('div');
    termEl.className = 'map-card-term';
    termEl.style.cssText = `font-family:var(--mono);font-size:9px;color:${meta.color};opacity:0.8;margin-bottom:6px;`;
    termEl.textContent = meta.term;
    card.appendChild(termEl);

    const ringWrap = document.createElement('div');
    ringWrap.className = 'map-card-ring';
    ringWrap.style.cssText = `
      width:${ringSize}px; height:${ringSize}px;
      flex-shrink:0; margin:0 auto 8px;
      display:grid; place-items:center;
    `;

    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox',`0 0 ${ringSize} ${ringSize}`);
    svg.style.cssText = `grid-area:1/1; width:${ringSize}px;height:${ringSize}px;pointer-events:none`;

    const cx = ringSize / 2, cy = ringSize / 2;
    const bg = document.createElementNS(svgNS,'circle');
    bg.setAttribute('cx', cx); bg.setAttribute('cy', cy); bg.setAttribute('r', R);
    bg.setAttribute('fill','none'); bg.setAttribute('stroke','rgba(255,255,255,0.06)'); bg.setAttribute('stroke-width','4');
    svg.appendChild(bg);

    const fg = document.createElementNS(svgNS,'circle');
    fg.setAttribute('cx', cx); fg.setAttribute('cy', cy); fg.setAttribute('r', R);
    fg.setAttribute('fill','none'); fg.setAttribute('stroke', meta.color); fg.setAttribute('stroke-width','4');
    fg.setAttribute('stroke-linecap','round');
    fg.setAttribute('stroke-dasharray', circ.toFixed(1));
    fg.setAttribute('stroke-dashoffset', (circ * (1 - pct)).toFixed(1));
    fg.setAttribute('transform',`rotate(-90 ${cx} ${cy})`); fg.setAttribute('opacity','0.85');
    svg.appendChild(fg);

    ringWrap.appendChild(svg);

    // リング中央テキスト（グリッドで重ねる）
    const ringText = document.createElement('div');
    ringText.style.cssText = `
      grid-area:1/1; display:flex; flex-direction:column;
      align-items:center; justify-content:center; pointer-events:none;
    `;
    ringText.innerHTML = `
      <span style="font-family:var(--mono);font-size:11px;font-weight:700;color:${meta.color};line-height:1">${Math.round(pct*100)}%</span>
      <span style="font-family:var(--mono);font-size:8px;color:var(--text3);margin-top:1px">${dn}/${tot}</span>
    `;
    ringWrap.appendChild(ringText);
    card.appendChild(ringWrap);

    // タイトル
    const titleEl = document.createElement('div');
    titleEl.className = 'map-card-title';
    titleEl.style.cssText = 'font-size:13px;font-weight:700;color:var(--text);line-height:1.35;';
    titleEl.innerHTML = meta.label.replace('\n','<br>');
    card.appendChild(titleEl);

    // ── ツールチップ内容を構築して表示
    const buildAndShow = () => {
      clearTimeout(hideTimer);

      let html = `
        <div style="padding:9px 13px 7px;border-bottom:2px solid ${meta.color};display:flex;justify-content:space-between;align-items:center;gap:8px">
          <span style="font-size:12px;font-weight:700;color:${meta.color}">${sc.name}</span>
          <span style="font-family:var(--mono);font-size:9px;color:${meta.color};opacity:0.75;background:rgba(255,255,255,0.06);padding:1px 6px;border-radius:3px">${meta.term}</span>
          <button class="tt-close-btn" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;line-height:1;padding:0 4px;margin-left:auto;flex-shrink:0">×</button>
        </div>
        <div style="padding:9px 12px;display:flex;flex-direction:column;gap:5px">
      `;

      sc.phases.forEach((ph, pi) => {
        const pd  = ph.items.filter(i => state.checked[i.id]).length;
        const pt2 = ph.items.length;
        const ps  = phaseState(ph);
        const sc2 = ps==='done'?'#3fb950':ps==='active'?'#58a6ff':ps==='partial'?'#f0883e':'#404d61';
        const lbl = ps==='done'?'✓ 完了':ps==='active'?'▶ 学習中':ps==='partial'?'◑ 途中':'○ 未着手';
        const kws = [...new Set(ph.items.map(i=>i.review).filter(Boolean))];

        html += `
          <div style="background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:5px;padding:7px 9px">
            <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">
              <span style="width:6px;height:6px;border-radius:50%;background:${sc2};flex-shrink:0;display:inline-block"></span>
              <span style="flex:1;font-size:10px;font-weight:700;color:var(--text);cursor:pointer" class="tt-kw-btn" data-scope="${meta.id}" data-phase="${ph.id}" data-hour="${ph.hRange[0]}">${ph.title}</span>
              <span style="font-size:8px;font-family:var(--mono);color:${sc2}">${lbl}</span>
              <span style="font-size:8px;font-family:var(--mono);color:${sc2};background:rgba(255,255,255,0.05);padding:0 4px;border-radius:2px">${pd}/${pt2}</span>
            </div>
            <div style="font-size:8px;font-family:var(--mono);color:var(--text3);margin-bottom:5px">${ph.hRange[0]}〜${ph.hRange[ph.hRange.length-1]}時間目</div>
            <div style="display:flex;flex-wrap:wrap;gap:3px;align-items:center">
        `;

        kws.forEach((kw, ki) => {
          const allDone = ph.items.filter(i=>i.review===kw).every(i=>state.checked[i.id]);
          if (ki > 0) html += `<span style="font-size:8px;color:var(--text3)">→</span>`;
          html += `<span
            class="tt-kw-btn"
            data-scope="${meta.id}"
            data-phase="${ph.id}"
            data-hour="${ph.hRange[0]}"
            style="font-size:9px;padding:2px 8px;border-radius:8px;border:1px solid;white-space:nowrap;cursor:pointer;transition:filter 0.12s;
            ${allDone
              ? 'color:#3fb950;background:rgba(63,185,80,0.1);border-color:rgba(63,185,80,0.3)'
              : 'color:var(--text2);background:var(--surface2);border-color:var(--border2)'
            }">${kw}${allDone?' ✓':''}</span>`;
        });

        html += `</div></div>`;
        if (pi < sc.phases.length - 1) {
          html += `<div style="text-align:center;font-size:11px;color:${meta.color};opacity:0.4;margin:-2px 0">↓</div>`;
        }
      });

      html += `</div>
        <div class="tt-kw-btn" data-scope="${meta.id}" data-phase="${sc.phases[0].id}" data-hour="${sc.phases[0].hRange[0]}"
          style="padding:7px 13px;border-top:1px solid var(--border);font-size:9px;font-family:var(--mono);color:var(--text3);text-align:right;cursor:pointer;transition:color 0.15s">
          チェックリストを開く →
        </div>`;

      tooltip.innerHTML = html;

      // 閉じるボタン
      const closeBtn = tooltip.querySelector('.tt-close-btn');
      if (closeBtn) {
        closeBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          tooltip.classList.remove('visible');
        });
      }

      // キーワードタグ・フェーズタイトルのクリックで該当画面へ遷移
      tooltip.querySelectorAll('.tt-kw-btn').forEach(btn => {
        btn.addEventListener('mouseenter', () => { btn.style.filter = 'brightness(1.25)'; btn.style.transform = 'translateY(-1px)'; });
        btn.addEventListener('mouseleave', () => { btn.style.filter = ''; btn.style.transform = ''; });
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const sid   = btn.dataset.scope;
          const phId  = btn.dataset.phase;
          const hour  = parseInt(btn.dataset.hour);
          tooltip.classList.remove('visible');
          state.scopeId      = sid;
          state.currentHour  = hour;
          renderAll();
          // フェーズカードまでスクロール
          setTimeout(() => {
            const el = document.getElementById('pc-' + phId);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 120);
        });
      });

      tooltip.classList.add('visible');

      const isMobileView = window.innerWidth <= 768;
      if (isMobileView) {
        // モバイル：画面中央〜下部に固定表示（fullwidth）
        tooltip.style.left   = '12px';
        tooltip.style.right  = '12px';
        tooltip.style.top    = 'auto';
        tooltip.style.bottom = '20px';
        tooltip.style.width  = 'auto';
        tooltip.style.maxWidth = 'calc(100vw - 24px)';
      } else {
        // PC：カードの下に表示
        const cardRect = card.getBoundingClientRect();
        const tw = 340;
        let left = cardRect.left + cardRect.width / 2 - tw / 2;
        left = Math.max(8, Math.min(window.innerWidth - tw - 8, left));
        const top = cardRect.bottom + 8;
        tooltip.style.left  = left + 'px';
        tooltip.style.top   = top  + 'px';
        tooltip.style.width = tw + 'px';
        tooltip.style.bottom = 'auto';
        tooltip.style.right  = 'auto';
      }
    };

    card.addEventListener('mouseenter', () => {
      card.style.borderColor = meta.color;
      card.style.boxShadow   = `0 0 20px ${meta.color}40`;
      card.style.transform   = 'translateY(-2px)';
      buildAndShow();
    });
    card.addEventListener('mouseleave', () => {
      card.style.borderColor = `${meta.color}66`;
      card.style.boxShadow   = '';
      card.style.transform   = '';
      hideTimer = setTimeout(() => tooltip.classList.remove('visible'), 150);
    });
    card.addEventListener('click', () => {
      state.scopeId = meta.id;
      state.currentHour = 1;
      renderAll();
    });

    mapWrap.appendChild(card);
  });

  tooltip.addEventListener('mouseenter', () => clearTimeout(hideTimer));
  tooltip.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));

  main.appendChild(mapWrap);

  // ── 学期カードグリッド
  const scopeMetaMap = Object.fromEntries(scopeMeta.map(m=>[m.id,m]));
  const semester = [
    { label:'1学期', ids:['mid1','fin1'] },
    { label:'2学期', ids:['mid2','fin2'] },
    { label:'3学期', ids:['term3'] },
  ];
  semester.forEach(sem => {
    const row = document.createElement('div');
    row.className = 'home-row';
    row.innerHTML = `<div class="home-row-label">${sem.label}</div><div class="home-row-cards" id="row-${sem.label}"></div>`;
    main.appendChild(row);
    const cardsEl = row.querySelector(`#row-${sem.label}`);

    sem.ids.forEach(sid => {
      const sc   = SCOPES.find(s => s.id === sid);
      const meta = scopeMetaMap[sid];
      const tot  = allItems(sc).length, dn = doneCount(sc);
      const pct  = tot ? Math.round(dn/tot*100) : 0;
      const card = document.createElement('div');
      card.className = 'home-scope-card';
      card.style.setProperty('--c', meta.color);

      const phaseList = sc.phases.map(ph => {
        const pd = ph.items.filter(i=>state.checked[i.id]).length, pt2 = ph.items.length;
        const ps = phaseState(ph);
        const dot = ps==='done'?'var(--green)':ps==='active'?'var(--accent)':ps==='partial'?'var(--orange)':'var(--border2)';
        return `<div class="home-phase-row">
          <span class="home-phase-dot" style="background:${dot}"></span>
          <span class="home-phase-name">${ph.title}</span>
          <span class="home-phase-count">${pd}/${pt2}</span>
        </div>`;
      }).join('');

      card.innerHTML = `
        <div class="home-card-top">
          <div><div class="home-card-name">${sc.name}</div><div class="home-card-desc">${sc.desc}</div></div>
          <div class="home-card-pct">${pct}%</div>
        </div>
        <div class="home-card-bar"><div class="home-card-bar-fill" style="width:${pct}%;background:${meta.color}"></div></div>
        <div class="home-card-phases">${phaseList}</div>
        <div class="home-card-btn">チェックリストを開く →</div>
      `;
      card.addEventListener('click', () => { state.scopeId=sid; state.currentHour=1; renderAll(); });
      cardsEl.appendChild(card);
    });
  });
}

function renderMain() {
  const main = document.getElementById('main');
  const sc = scope();
  if (!sc) {
    if (state.scopeId === '__log__') { renderLogPage(); return; }
    if (state.scopeId === '__how__') { renderHowPage(); return; }
    renderHome();
    return;
  }
  document.getElementById('headerBadge').textContent = sc.name;
  main.innerHTML = '';

  const items = allItems(sc), done = doneCount(sc), total = items.length;
  const pct = total ? Math.round(done/total*100) : 0;

  // ── OVERVIEW
  const ov = document.createElement('div'); ov.className = 'overview';
  ov.innerHTML = `
    <div class="overview-top">
      <div class="overview-title"><h2>${sc.name}　<span style="font-size:12px;font-weight:400;color:var(--text2)">${sc.desc}</span></h2></div>
      <div class="ov-stats">
        <div class="ov-stat"><div class="ov-num g">${done}</div><div class="ov-lbl">完了</div></div>
        <div class="ov-stat"><div class="ov-num b">${total}</div><div class="ov-lbl">合計</div></div>
        <div class="ov-stat"><div class="ov-num o">${pct}%</div><div class="ov-lbl">達成率</div></div>
      </div>
    </div>
    <div class="tl-labels">${Array.from({length:sc.totalHours},(_,i)=>`<span>${i+1}h</span>`).join('')}</div>
    <div class="tl-track" id="tlT"></div>
    <div class="hour-row"><label>現在地（何時間目まで学習しましたか？）</label><div class="hr-btns" id="hrB"></div></div>
  `;
  main.appendChild(ov);
  const tlt = ov.querySelector('#tlT');
  for (let h=1;h<=sc.totalHours;h++) {
    const b=document.createElement('div');
    const hs=hourState(sc,h);
    b.className=`tl-blk ${hs==='current'?'st-current':hs==='done'?'st-done':hs==='partial'?'st-partial':'st-future'}`;
    b.title=`${h}時間目`; b.onclick=()=>{state.currentHour=h;renderAll();};
    tlt.appendChild(b);
  }
  const hrb=ov.querySelector('#hrB');
  for(let h=1;h<=sc.totalHours;h++){
    const b=document.createElement('button');
    const hs=hourState(sc,h);
    b.className='hr-btn'+(h===state.currentHour?' active':(hs==='done'?' done':''));
    b.textContent=`${h}h`; b.onclick=()=>{state.currentHour=h;renderAll();};
    hrb.appendChild(b);
  }

  // ── FLOW MAP
  const flow=document.createElement('div'); flow.className='flow-section';
  flow.innerHTML=`<div class="flow-header">📋 ${sc.name} ロードマップ <span style="font-size:9px;color:var(--text3);font-family:var(--mono)">（各フェーズをクリックでジャンプ）</span></div><div class="flow-body" id="fb"></div>`;
  main.appendChild(flow);
  const fb=flow.querySelector('#fb');
  sc.phases.forEach((ph,idx)=>{
    const ps=phaseState(ph);
    const pd=ph.items.filter(i=>state.checked[i.id]).length, pt=ph.items.length;
    const pp=pt?pd/pt:0, r=16, circ=2*Math.PI*r;
    if(idx>0){const a=document.createElement('div');a.className='flow-arrow';a.textContent='→';fb.appendChild(a);}
    const node=document.createElement('div');
    node.className=`flow-node fn-${ps==='active'?'active':ps==='done'?'done':ps==='partial'?'partial':''}`;
    node.innerHTML=`
      <div class="flow-circle">
        <svg viewBox="0 0 44 44"><circle cx="22" cy="22" r="${r}" fill="none" stroke="var(--border2)" stroke-width="2"/>
        <circle cx="22" cy="22" r="${r}" fill="none" stroke="${ps==='done'?'var(--green)':ps==='active'?'var(--accent)':ps==='partial'?'var(--orange)':'var(--border2)'}" stroke-width="2" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pp)}" transform="rotate(-90 22 22)"/></svg>
        <span>${Math.round(pp*100)}%</span>
      </div>
      <div class="flow-node-name">${ph.title}</div>
    `;
    node.onclick=()=>{state.currentHour=ph.hRange[0];renderAll();setTimeout(()=>{const el=document.getElementById('pc-'+ph.id);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},100);};
    fb.appendChild(node);
  });

  // ── PHASE CARDS
  const grid=document.createElement('div'); grid.className='cards-grid'; main.appendChild(grid);
  sc.phases.forEach(ph=>{
    const ps=phaseState(ph);
    const pd=ph.items.filter(i=>state.checked[i.id]).length, pt=ph.items.length;
    const pp=pt?pd/pt:0, r=11, circ=2*Math.PI*r;
    const card=document.createElement('div');
    card.className='phase-card'+(ps==='active'?' is-active':''); card.id='pc-'+ph.id;
    card.innerHTML=`
      <div class="pc-header">
        <svg class="pc-ring" viewBox="0 0 30 30">
          <circle cx="15" cy="15" r="${r}" fill="none" stroke="var(--border2)" stroke-width="2"/>
          <circle cx="15" cy="15" r="${r}" fill="none" stroke="${pp===1?'var(--green)':ps==='active'?'var(--accent)':'var(--border2)'}" stroke-width="2" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pp)}" transform="rotate(-90 15 15)"/>
        </svg>
        <span class="pc-num">${ph.hRange[0]}〜${ph.hRange[ph.hRange.length-1]}h</span>
        <span class="pc-title">${ph.title}</span>
        <span style="font-size:9px;color:var(--text3);font-family:var(--mono);flex-shrink:0">${pd}/${pt}</span>
        <span class="pc-arrow">▾</span>
      </div>
      <div class="pc-body"><ul class="checklist" id="cl-${ph.id}"></ul></div>
    `;
    card.querySelector('.pc-header').onclick=()=>card.classList.toggle('collapsed');
    grid.appendChild(card);
    const ul=card.querySelector(`#cl-${ph.id}`);
    ph.items.forEach(item=>{
      const ck=!!state.checked[item.id], cur=item.h===state.currentHour;
      const li=document.createElement('li');
      li.className='ci'+(ck?' ck':'')+(cur&&!ck?' cur':'');
      li.innerHTML=`
        <div class="ci-box"><svg class="ci-check" width="9" height="9" viewBox="0 0 9 9"><polyline points="1,4.5 3.5,7 8,1.5" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg></div>
        <div class="ci-body">
          <div class="ci-text">${item.text}</div>
          <div class="ci-meta">${item.h}時間目${ck?' ✓ 完了':cur?' ← 現在地':''}</div>
        </div>
      `;
      // クイズボタンをci-boxの直後（テキストの前）に挿入
      const qBtn = document.createElement('button');
      qBtn.className = 'quiz-btn';
      qBtn.title = '確認クイズ';
      qBtn.textContent = '🧩';
      qBtn.addEventListener('click', (e)=>{
        e.stopPropagation();
        e.preventDefault();
        openQuizModal(item);
      });
      // ci-box の直後、ci-body の前に挿入
      const ciBody = li.querySelector('.ci-body');
      li.insertBefore(qBtn, ciBody);

      // 授業メモボタン（対応する録音メモがある場合のみ）
      const note = getLessonNote(item.id);
      if (note) {
        const nBtn = document.createElement('button');
        nBtn.className = 'note-btn';
        nBtn.title = '授業メモを見る';
        nBtn.textContent = '📝';
        nBtn.addEventListener('click', (e)=>{
          e.stopPropagation();
          e.preventDefault();
          openNoteModal(note, item.id);
        });
        li.insertBefore(nBtn, ciBody);
      }

      li.addEventListener('click', (e)=>{
        if(!e.target.closest('.quiz-btn') && !e.target.closest('.note-btn')) toggleCheck(item.id);
      });
      ul.appendChild(li);
    });
  });

  // ── 到達確認
  const hAll=items.filter(i=>i.h===state.currentHour);
  const hDone=hAll.filter(i=>state.checked[i.id]).length;
  const detail=document.createElement('div'); detail.className='detail-card';
  detail.innerHTML=`
    <div class="detail-head"><h3>📍 第${state.currentHour}時間目の到達確認チェックリスト</h3><span class="badge ${hDone===hAll.length&&hAll.length>0?'badge-g':'badge-b'}">${hDone}/${hAll.length}</span></div>
    <div class="detail-body" id="abB"></div>
  `;
  main.appendChild(detail);
  const ab=detail.querySelector('#abB');
  if(!hAll.length){ab.innerHTML=`<p style="color:var(--text3);font-size:11px">この時間帯の指定項目はありません。</p>`;}
  else{
    const can=hAll.filter(i=>state.checked[i.id]), cannot=hAll.filter(i=>!state.checked[i.id]);
    if(can.length){
      const s=document.createElement('div'); s.className='ab-section';
      s.innerHTML=`<div class="ab-label">✅ できている（${can.length}）</div>`;
      can.forEach(i=>{const d=document.createElement('div');d.className='ab-item can';d.innerHTML=`<div class="ab-dot"></div><div class="ab-content"><div class="ab-text">${i.text}</div></div>`;s.appendChild(d);});
      ab.appendChild(s);
    }
    if(cannot.length){
      const s=document.createElement('div'); s.className='ab-section';
      s.innerHTML=`<div class="ab-label">⚠️ まだ自信がない（${cannot.length}）</div>`;
      cannot.forEach(i=>{const d=document.createElement('div');d.className='ab-item cannot';d.innerHTML=`<div class="ab-dot"></div><div class="ab-content"><div class="ab-text">${i.text}</div>${i.review?`<div class="ab-hint" onclick="openModal('${i.id}')">↩ 振り返る：${i.review}</div>`:''}</div>`;s.appendChild(d);});
      ab.appendChild(s);
    }
  }

  // ── 振り返りパネル
  const past=items.filter(i=>i.h<state.currentHour&&!state.checked[i.id]);
  const rv=document.createElement('div'); rv.className='review-card'+(past.length===0?' hidden':'');
  rv.innerHTML=`<div class="review-head"><h3>🔁 前の時間帯の未完了項目（${past.length}個）</h3></div><div class="review-body" id="rvB"></div>`;
  main.appendChild(rv);
  if(past.length){
    const rvb=rv.querySelector('#rvB');
    past.forEach(i=>{const d=document.createElement('div');d.className='rv-item';d.innerHTML=`<div><div class="rv-title">${i.text}</div><div class="rv-sub">${i.h}時間目の項目</div>${i.review?`<div class="rv-link" onclick="openModal('${i.id}')">↩ 「${i.review}」を振り返る</div>`:''}</div>`;rvb.appendChild(d);});
  }
}

function toggleCheck(id) { state.checked[id]=!state.checked[id]; save(); renderAll(); }

function openModal(itemId) {
  const sc=scope(); if(!sc) return;
  const item=allItems(sc).find(i=>i.id===itemId); if(!item) return;
  const hint=HINTS[item.review]||`教科書・ノートで「${item.review}」を確認し、自分の言葉で説明できるか確かめましょう。`;
  document.getElementById('modalBody').innerHTML=`
    <button class="modal-close" onclick="closeModal()">×</button>
    <h2 style="margin-bottom:10px;color:var(--orange)">振り返り：${item.review}</h2>
    <div style="background:var(--surface2);border-radius:6px;padding:12px 14px;font-size:12px;line-height:1.9;color:var(--text2);margin-bottom:12px">${hint}</div>
    <div style="background:var(--done-bg);border:1px solid rgba(63,185,80,0.2);border-radius:6px;padding:10px 12px;font-size:11px;line-height:1.7;color:var(--text2)">
      <strong style="color:var(--green)">チェック項目：</strong><br>${item.text}
    </div>
    <div style="margin-top:12px;text-align:right">
      <button onclick="toggleFromModal('${item.id}')" style="background:var(--green);border:none;color:#000;padding:6px 14px;border-radius:5px;cursor:pointer;font-weight:700;font-size:12px">
        ${state.checked[item.id]?'☑ 完了を取り消す':'✓ 理解できた！完了にする'}
      </button>
    </div>
  `;
  document.getElementById('overlay').classList.add('open');
}
function toggleFromModal(id) { state.checked[id]=!state.checked[id]; save(); renderAll(); closeModal(); }
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
document.getElementById('modalClose').onclick=closeModal;
document.getElementById('overlay').onclick=(e)=>{if(e.target===e.currentTarget)closeModal();};
